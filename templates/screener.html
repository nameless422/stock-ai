<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>策略选股 · Stock AI</title>
    <link rel="stylesheet" href="/static/base.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        /* ---------- 页面级样式（复用 base.css tokens） ---------- */
        .hero {
            margin-bottom: var(--sp-5);
        }
        .hero-title-row {
            display: flex;
            align-items: baseline;
            gap: var(--sp-3);
            flex-wrap: wrap;
            margin-bottom: var(--sp-2);
        }
        .hero-desc {
            color: var(--text-2);
            font-size: 13px;
            max-width: 680px;
        }

        .nav-links {
            display: flex;
            gap: var(--sp-3);
            align-items: center;
            color: var(--text-3);
            font-size: 12px;
        }
        .nav-links a { color: var(--text-2); }
        .nav-links a:hover { color: var(--text-1); }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(120px, 160px) minmax(0, 1fr) auto auto;
            gap: var(--sp-3);
            align-items: center;
        }
        @media (max-width: 720px) {
            .toolbar {
                grid-template-columns: 1fr 1fr;
            }
            .toolbar > .btn { grid-column: span 1; }
        }

        /* 状态卡 */
        .status-card {
            transition: border-color var(--t-med) var(--ease), background var(--t-med) var(--ease);
        }
        .status-card.is-running {
            border-color: rgba(91, 141, 239, 0.35);
            background: linear-gradient(180deg, rgba(91, 141, 239, 0.05), var(--card));
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--sp-4);
            margin-top: var(--sp-3);
        }
        @media (max-width: 560px) {
            .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .status-grid > :nth-child(3) { grid-column: span 2; }
        }
        .stat-tile {
            padding: var(--sp-3) var(--sp-4);
            background: var(--bg-elev);
            border-radius: var(--r-md);
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-1);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        .stat-sub {
            font-size: 11px;
            color: var(--text-2);
            margin-top: 2px;
        }
        .status-progress-row {
            margin-top: var(--sp-4);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }
        .status-progress-row .progress { flex: 1; }

        /* 主栅格 */
        .grid-main {
            display: grid;
            gap: var(--sp-4);
        }
        @media (min-width: 960px) {
            .grid-main {
                grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
                align-items: start;
            }
            .col-history {
                position: sticky;
                top: var(--sp-4);
                max-height: calc(100vh - var(--sp-5) - var(--sp-4));
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .col-history .card-body { flex: 1; overflow-y: auto; }
        }

        /* 结果卡 */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }
        .result-item {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--sp-4);
            animation: fade-in-up var(--t-fast) var(--ease) both;
            display: block;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
        }
        .result-item:hover {
            border-color: var(--primary);
            background: var(--card-hover);
        }
        .result-item:active { transform: scale(0.997); }
        .result-item .result-link-hint {
            font-size: 11px;
            color: var(--text-3);
            margin-left: var(--sp-2);
            opacity: 0;
            transition: opacity var(--t-fast) var(--ease);
            white-space: nowrap;
        }
        .result-item:hover .result-link-hint {
            opacity: 1;
            color: var(--primary);
        }
        .result-item:nth-child(1) { animation-delay: 0ms; }
        .result-item:nth-child(2) { animation-delay: 20ms; }
        .result-item:nth-child(3) { animation-delay: 40ms; }
        .result-item:nth-child(4) { animation-delay: 60ms; }
        .result-item:nth-child(5) { animation-delay: 80ms; }
        .result-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--sp-3);
            margin-bottom: var(--sp-3);
        }
        .result-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-1);
            margin-right: var(--sp-2);
        }
        .result-code {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-3);
        }
        .result-strategies {
            margin: var(--sp-2) 0;
        }
        .result-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--sp-2);
            margin-top: var(--sp-3);
        }
        .metric-tile {
            padding: var(--sp-2) var(--sp-3);
            background: var(--card);
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
        }
        .metric-label {
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .metric-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }
        .result-reason {
            font-size: 12px;
            color: var(--text-2);
            line-height: 1.6;
            margin-top: var(--sp-2);
            padding: var(--sp-2) var(--sp-3);
            background: var(--card);
            border-radius: var(--r-sm);
            border-left: 2px solid var(--primary);
        }

        /* 历史项 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-2);
        }
        .history-item {
            padding: var(--sp-3);
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            cursor: pointer;
            transition: border-color var(--t-fast) var(--ease), background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
        }
        .history-item:hover {
            border-color: var(--primary);
            background: var(--card-hover);
        }
        .history-item.is-active {
            border-color: var(--primary);
            background: var(--primary-dim);
        }
        .history-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--sp-2);
            flex-wrap: wrap;
        }
        .history-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1);
        }
        .history-meta {
            font-size: 11px;
            color: var(--text-3);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        /* 失败摘要 */
        .failure-summary {
            margin-top: var(--sp-3);
            padding: var(--sp-3);
            background: rgba(247, 185, 85, 0.06);
            border: 1px solid rgba(247, 185, 85, 0.2);
            border-radius: var(--r-md);
            font-size: 12px;
            color: var(--text-2);
            line-height: 1.6;
        }
        .failure-summary-label {
            color: var(--accent);
            font-weight: 600;
            margin-right: 6px;
        }

        /* 抽屉内容 */
        .drawer-meta {
            display: flex;
            gap: var(--sp-3);
            align-items: center;
            color: var(--text-2);
            font-size: 12px;
            flex-wrap: wrap;
        }

        /* 移动端 segmented 容器 */
        .view-mobile-seg {
            display: flex;
            width: 100%;
        }
        .view-mobile-seg .seg {
            flex: 1;
            display: flex;
        }

        /* 隐藏 alpine 还没初始化前的原始 DOM */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
    <div class="page" x-data="screener()" x-init="init()" x-cloak>

        <!-- ========== 头部 ========== -->
        <header class="hero">
            <div class="hero-title-row">
                <h1 class="title-xl">策略选股</h1>
                <span x-show="status && status.running" class="badge badge-dot badge-live"
                      style="background: rgba(91, 141, 239, 0.16); color: var(--primary);">
                    扫描中
                </span>
            </div>
            <div class="hero-desc">
                按单个策略或策略组跑全市场扫描，查看每次运行的命中结果与原因。策略可在
                <a href="/strategies">策略管理</a> 里维护。
            </div>
        </header>

        <!-- ========== 工具栏 ========== -->
        <div class="card card-compact stack" style="margin-bottom: var(--sp-4);">
            <div class="toolbar">
                <select class="select" x-model="targetType" @change="onTargetTypeChange()">
                    <option value="strategy">按策略执行</option>
                    <option value="group">按策略组执行</option>
                </select>
                <select class="select" x-model.number="targetId">
                    <template x-if="currentTargetList().length === 0">
                        <option value="">暂无可选</option>
                    </template>
                    <template x-for="item in currentTargetList()" :key="item.id">
                        <option :value="item.id" x-text="item.name"></option>
                    </template>
                </select>
                <button class="btn btn-primary" @click="runScreener()"
                        :disabled="!canRun">
                    <template x-if="isStarting || (status && status.running)">
                        <span class="spinner spinner-on-primary"></span>
                    </template>
                    <span x-text="status && status.running ? '运行中' : '开始扫描'"></span>
                </button>
                <a class="btn btn-ghost md-only" href="/strategies">管理策略</a>
            </div>
        </div>

        <!-- ========== 状态卡 ========== -->
        <section class="card status-card" :class="{ 'is-running': status && status.running }"
                 style="margin-bottom: var(--sp-4);">
            <div class="row-between">
                <div>
                    <div class="title-md" x-text="status && status.target_name ? status.target_name : (currentTargetName() || '等待选择目标')"></div>
                    <div class="text-2 text-small" style="margin-top: 4px;">
                        <template x-if="status && status.running">
                            <span style="color: var(--primary);">正在扫描全市场…</span>
                        </template>
                        <template x-if="status && !status.running && status.status === 'completed'">
                            <span>最近一次运行已完成</span>
                        </template>
                        <template x-if="status && !status.running && status.status !== 'completed'">
                            <span>当前没有运行中的任务</span>
                        </template>
                        <template x-if="!status">
                            <span>加载中…</span>
                        </template>
                    </div>
                </div>
                <div class="text-2 text-small" x-show="status && status.time">
                    <span class="text-3">最近运行 · </span>
                    <span x-text="status && status.time"></span>
                </div>
            </div>

            <div class="status-grid">
                <div class="stat-tile">
                    <div class="stat-label">命中</div>
                    <div class="stat-value" x-text="(status && status.matched_count) || 0"></div>
                    <div class="stat-sub">只股票</div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">扫描进度</div>
                    <div class="stat-value" x-text="`${(status && status.processed) || 0} / ${(status && status.total_stocks) || 0}`"></div>
                    <div class="stat-sub" x-text="progressPercent + '%'"></div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">目标类型</div>
                    <div class="stat-value" style="font-size: 16px; padding-top: 2px;"
                         x-text="targetType === 'group' ? '策略组' : '单策略'"></div>
                    <div class="stat-sub" x-text="status && status.target_logic ? status.target_logic : '—'"></div>
                </div>
            </div>

            <div class="status-progress-row" x-show="status && (status.total_stocks > 0 || status.running)">
                <div class="progress">
                    <div class="progress-bar" :style="`width: ${progressPercent}%`"></div>
                </div>
                <div class="text-3 text-small" x-text="progressPercent + '%'"></div>
            </div>

            <div class="failure-summary" x-show="status && status.failure_summary">
                <span class="failure-summary-label">未命中摘要</span>
                <span x-text="status && status.failure_summary"></span>
            </div>
        </section>

        <!-- ========== 移动端 segmented 视图切换 ========== -->
        <div class="sm-only" style="margin-bottom: var(--sp-3);">
            <div class="seg view-mobile-seg">
                <button class="seg-btn" :class="{ active: view === 'results' }" @click="view = 'results'">
                    结果 <span class="text-3" x-text="`· ${results ? results.length : 0}`"></span>
                </button>
                <button class="seg-btn" :class="{ active: view === 'history' }" @click="view = 'history'">
                    历史 <span class="text-3" x-text="`· ${history ? history.length : 0}`"></span>
                </button>
            </div>
        </div>

        <!-- ========== 主内容 ========== -->
        <div class="grid-main">

            <!-- 结果列 -->
            <section class="card" x-show="isDesktop || view === 'results'">
                <div class="card-header">
                    <div>
                        <div class="title-lg">最新结果</div>
                        <div class="text-2 text-small" x-show="results">
                            共 <span x-text="results ? results.length : 0"></span> 条
                            <span x-show="status && status.time" class="text-3"> · <span x-text="status && status.time"></span></span>
                        </div>
                    </div>
                </div>

                <!-- 骨架 -->
                <template x-if="results === null">
                    <div>
                        <div class="skeleton skeleton-row"></div>
                        <div class="skeleton skeleton-row"></div>
                        <div class="skeleton skeleton-row"></div>
                    </div>
                </template>

                <!-- 空态 -->
                <template x-if="results !== null && results.length === 0">
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <div>当前没有命中结果</div>
                        <div class="text-3">选择策略后点击"开始扫描"</div>
                    </div>
                </template>

                <!-- 列表 -->
                <div class="result-list" x-show="results && results.length > 0">
                    <template x-for="item in paginatedResults" :key="item.code">
                        <a class="result-item" :href="stockDetailUrl(item.code)" :title="`查看 ${item.name} 的 K 线`">
                            <div class="result-head">
                                <div>
                                    <span class="result-name" x-text="item.name"></span>
                                    <span class="result-code" x-text="item.code"></span>
                                    <span class="result-link-hint">查看 K 线 →</span>
                                </div>
                                <span class="score-badge">
                                    <span x-text="Number(item.score || 0).toFixed(1)"></span>
                                    <span class="score-unit">分</span>
                                </span>
                            </div>
                            <div class="result-strategies">
                                <template x-if="(item.matched_strategies || []).length > 0">
                                    <template x-for="name in item.matched_strategies" :key="name">
                                        <span class="pill" x-text="name"></span>
                                    </template>
                                </template>
                                <template x-if="!item.matched_strategies || item.matched_strategies.length === 0">
                                    <span class="pill" style="opacity: 0.6;">未返回命中策略</span>
                                </template>
                            </div>
                            <div class="result-reason" x-text="item.reason || item.weekly || '—'"></div>
                            <div class="result-metrics">
                                <div class="metric-tile">
                                    <div class="metric-label">成交量</div>
                                    <div class="metric-value" x-text="formatVol(item.current_vol)"></div>
                                </div>
                                <div class="metric-tile">
                                    <div class="metric-label">DIF</div>
                                    <div class="metric-value" x-text="Number(item.dif || 0).toFixed(2)"></div>
                                </div>
                                <div class="metric-tile">
                                    <div class="metric-label">DEA</div>
                                    <div class="metric-value" x-text="Number(item.dea || 0).toFixed(2)"></div>
                                </div>
                            </div>
                        </a>
                    </template>
                </div>

                <!-- 分页 -->
                <div class="pager" x-show="results && results.length > PAGE_SIZE">
                    <div class="pager-info">共 <span x-text="results ? results.length : 0"></span> 条，每页 <span x-text="PAGE_SIZE"></span> 条</div>
                    <div class="pager-actions">
                        <button class="btn btn-ghost btn-sm" @click="resultsPage = 1" :disabled="resultsPage === 1">首页</button>
                        <button class="btn btn-ghost btn-sm" @click="resultsPage--" :disabled="resultsPage === 1">上一页</button>
                        <span class="pager-chip" x-text="`${resultsPage} / ${totalPages(results)}`"></span>
                        <button class="btn btn-ghost btn-sm" @click="resultsPage++" :disabled="resultsPage >= totalPages(results)">下一页</button>
                        <button class="btn btn-ghost btn-sm" @click="resultsPage = totalPages(results)" :disabled="resultsPage >= totalPages(results)">末页</button>
                    </div>
                </div>
            </section>

            <!-- 历史列 -->
            <aside class="card col-history" x-show="isDesktop || view === 'history'">
                <div class="card-header">
                    <div class="title-lg">运行历史</div>
                    <div class="text-3 text-small">点击查看详情</div>
                </div>
                <div class="card-body">
                    <template x-if="history === null">
                        <div>
                            <div class="skeleton skeleton-row" style="height: 60px;"></div>
                            <div class="skeleton skeleton-row" style="height: 60px;"></div>
                        </div>
                    </template>

                    <template x-if="history !== null && history.length === 0">
                        <div class="empty">
                            <div class="text-3">暂无历史记录</div>
                        </div>
                    </template>

                    <div class="history-list" x-show="history && history.length > 0">
                        <template x-for="item in paginatedHistory" :key="(item.run_token || '') + item.run_date + item.run_time">
                            <div class="history-item"
                                 :class="{ 'is-active': isActiveHistory(item) }"
                                 @click="openDetail(item)">
                                <div class="history-head">
                                    <span class="history-name" x-text="item.target_name || '未命名目标'"></span>
                                    <span class="badge badge-dim" x-text="`${item.matched_count || 0} / ${item.total_stocks || 0}`"></span>
                                </div>
                                <div class="history-meta">
                                    <span x-text="item.run_date"></span>
                                    <span x-text="' · ' + item.run_time"></span>
                                    <span x-text="' · ' + (item.target_type === 'group' ? '策略组' : '策略')"></span>
                                    <span x-show="item.target_logic" x-text="' · ' + item.target_logic"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="pager" x-show="history && history.length > PAGE_SIZE">
                        <div class="pager-actions" style="width: 100%; justify-content: space-between;">
                            <button class="btn btn-ghost btn-sm" @click="historyPage--" :disabled="historyPage === 1">上一页</button>
                            <span class="pager-chip" x-text="`${historyPage} / ${totalPages(history)}`"></span>
                            <button class="btn btn-ghost btn-sm" @click="historyPage++" :disabled="historyPage >= totalPages(history)">下一页</button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- 底部导航 -->
        <footer class="nav-links" style="margin-top: var(--sp-5); justify-content: center;">
            <a href="/">股票分析</a>
            <span>·</span>
            <a href="/strategies">策略管理</a>
            <span>·</span>
        </footer>

        <!-- ========== 详情抽屉 ========== -->
        <template x-if="detail">
            <div>
                <div class="drawer-backdrop"
                     x-transition.opacity
                     @click="closeDetail()"></div>
                <aside class="drawer"
                       x-transition:enter="drawer-enter"
                       x-transition:enter-start="drawer-enter-start"
                       x-transition:enter-end="drawer-enter-end"
                       x-transition:leave="drawer-leave"
                       x-transition:leave-start="drawer-leave-start"
                       x-transition:leave-end="drawer-leave-end">
                    <header class="drawer-header">
                        <div>
                            <div class="title-lg" x-text="detail.target_name || '运行详情'"></div>
                            <div class="drawer-meta" style="margin-top: 4px;">
                                <span x-text="detail.run_date"></span>
                                <span x-text="detail.run_time"></span>
                                <span class="badge badge-dim" x-text="`${detail.results ? detail.results.length : 0} 只命中`"></span>
                            </div>
                        </div>
                        <button class="btn btn-ghost btn-icon" @click="closeDetail()" aria-label="关闭">✕</button>
                    </header>
                    <div class="drawer-body">
                        <template x-if="detail.results === null">
                            <div>
                                <div class="skeleton skeleton-row"></div>
                                <div class="skeleton skeleton-row"></div>
                            </div>
                        </template>
                        <template x-if="detail.results !== null && detail.results.length === 0">
                            <div class="empty">
                                <div class="text-3">本次运行没有命中股票</div>
                            </div>
                        </template>
                        <div class="result-list" x-show="detail.results && detail.results.length > 0">
                            <template x-for="item in paginatedDetail" :key="item.stock_code">
                                <a class="result-item" :href="stockDetailUrl(item.stock_code)" :title="`查看 ${item.stock_name} 的 K 线`">
                                    <div class="result-head">
                                        <div>
                                            <span class="result-name" x-text="item.stock_name"></span>
                                            <span class="result-code" x-text="item.stock_code"></span>
                                            <span class="result-link-hint">查看 K 线 →</span>
                                        </div>
                                        <span class="score-badge">
                                            <span x-text="Number(item.score || 0).toFixed(1)"></span>
                                            <span class="score-unit">分</span>
                                        </span>
                                    </div>
                                    <div class="result-strategies">
                                        <template x-for="name in splitMatched(item.matched_strategies)" :key="name">
                                            <span class="pill" x-text="name"></span>
                                        </template>
                                    </div>
                                    <div class="result-reason" x-text="item.weekly_condition || '—'"></div>
                                </a>
                            </template>
                        </div>
                    </div>
                    <div class="drawer-footer" x-show="detail.results && detail.results.length > PAGE_SIZE">
                        <div class="pager-actions" style="width: 100%; justify-content: space-between;">
                            <button class="btn btn-ghost btn-sm" @click="detailPage--" :disabled="detailPage === 1">上一页</button>
                            <span class="pager-chip" x-text="`${detailPage} / ${totalPages(detail.results)}`"></span>
                            <button class="btn btn-ghost btn-sm" @click="detailPage++" :disabled="detailPage >= totalPages(detail.results)">下一页</button>
                        </div>
                    </div>
                </aside>
            </div>
        </template>

    </div>

    <style>
        /* 抽屉进出动画（只在此页面使用） */
        .drawer-enter { transition: transform var(--t-med) var(--ease); }
        .drawer-enter-start { transform: translateX(100%); }
        .drawer-enter-end { transform: translateX(0); }
        .drawer-leave { transition: transform var(--t-fast) var(--ease); }
        .drawer-leave-start { transform: translateX(0); }
        .drawer-leave-end { transform: translateX(100%); }
    </style>

    <script>
        function screener() {
            return {
                // ========== 常量 ==========
                PAGE_SIZE: 10,

                // ========== 静态 / 配置状态 ==========
                targets: { strategies: [], groups: [] },
                targetType: 'strategy',
                targetId: null,
                isDesktop: window.matchMedia('(min-width: 960px)').matches,
                view: 'results',          // 仅移动端用：'results' | 'history'
                isStarting: false,

                // ========== 数据状态（null 表示未加载，[] 表示空结果） ==========
                status: null,
                results: null,
                resultsPage: 1,
                history: null,
                historyPage: 1,
                detail: null,             // { run_date, run_time, target_type, target_id, target_name, run_token, results, total }
                detailPage: 1,

                // ========== 内部运行时 ==========
                gen: 0,                   // 目标变更时自增，用于丢弃旧响应
                timers: { status: null, results: null },
                controllers: {},          // 每个 channel 的 AbortController

                // ========== 计算属性 ==========
                get progressPercent() {
                    const s = this.status;
                    if (!s || !s.total_stocks) return 0;
                    return Math.min(100, Math.round((s.processed || 0) / s.total_stocks * 100));
                },
                get canRun() {
                    return !!this.targetId && !this.isStarting && !(this.status && this.status.running);
                },
                get paginatedResults() {
                    if (!this.results) return [];
                    const start = (this.resultsPage - 1) * this.PAGE_SIZE;
                    return this.results.slice(start, start + this.PAGE_SIZE);
                },
                get paginatedHistory() {
                    if (!this.history) return [];
                    const start = (this.historyPage - 1) * this.PAGE_SIZE;
                    return this.history.slice(start, start + this.PAGE_SIZE);
                },
                get paginatedDetail() {
                    if (!this.detail || !this.detail.results) return [];
                    const start = (this.detailPage - 1) * this.PAGE_SIZE;
                    return this.detail.results.slice(start, start + this.PAGE_SIZE);
                },

                // ========== 初始化 ==========
                async init() {
                    // 响应式断点
                    const mq = window.matchMedia('(min-width: 960px)');
                    const syncMq = () => { this.isDesktop = mq.matches; };
                    mq.addEventListener ? mq.addEventListener('change', syncMq) : mq.addListener(syncMq);

                    // 从 URL 预选目标（便于从策略页点"去选股页运行"跳过来）
                    try {
                        const qs = new URLSearchParams(window.location.search);
                        const qType = qs.get('target_type');
                        const qId = qs.get('target_id');
                        if (qType === 'strategy' || qType === 'group') this.targetType = qType;
                        if (qId) this.targetId = Number(qId);
                    } catch (_) {}

                    // 先加载目标、首轮数据，再开启 watch（避免 syncTargetSelection 触发双重刷新）
                    await this.loadTargets();
                    if (this.targetId) {
                        await this.refreshAll('init');
                    }
                    this.$watch('targetId', () => this.onTargetChange());
                    this.startPolling();

                    // 页面销毁时清理
                    window.addEventListener('beforeunload', () => this.stopPolling());
                },

                // ========== 目标管理 ==========
                currentTargetList() {
                    if (this.targetType === 'group') return this.targets.groups || [];
                    return (this.targets.strategies || []).filter(s => s.enabled !== 0);
                },
                currentTargetName() {
                    const list = this.currentTargetList();
                    const found = list.find(x => Number(x.id) === Number(this.targetId));
                    return found ? found.name : '';
                },
                async loadTargets() {
                    try {
                        const res = await fetch('/api/screener/targets');
                        this.targets = await res.json();
                        this.syncTargetSelection();
                    } catch (e) {
                        console.error('加载目标失败', e);
                    }
                },
                syncTargetSelection() {
                    const list = this.currentTargetList();
                    if (list.length === 0) { this.targetId = null; return; }
                    const exists = list.some(x => Number(x.id) === Number(this.targetId));
                    if (!exists) this.targetId = list[0].id;
                },
                onTargetTypeChange() {
                    this.syncTargetSelection();
                },

                // ========== 状态切换：重置 + 取消 + 重新拉 ==========
                onTargetChange() {
                    this.gen++;
                    this.cancelInflight();
                    this.results = null;
                    this.history = null;
                    this.resultsPage = 1;
                    this.historyPage = 1;
                    this.detail = null;
                    this.refreshAll('target-change');
                },

                cancelInflight() {
                    Object.values(this.controllers).forEach(c => { try { c && c.abort(); } catch (_) {} });
                    this.controllers = {};
                },

                async fetchJson(channel, url) {
                    const myGen = this.gen;
                    try {
                        if (this.controllers[channel]) {
                            try { this.controllers[channel].abort(); } catch (_) {}
                        }
                        const ctrl = new AbortController();
                        this.controllers[channel] = ctrl;
                        const res = await fetch(url, { signal: ctrl.signal });
                        if (myGen !== this.gen) return null;   // 目标已变，丢弃
                        if (!res.ok) return null;
                        return await res.json();
                    } catch (e) {
                        if (e.name === 'AbortError') return null;
                        console.warn(`[${channel}] fetch failed`, e);
                        return null;
                    } finally {
                        if (this.controllers[channel] && this.controllers[channel].signal.aborted) {
                            delete this.controllers[channel];
                        }
                    }
                },

                buildQuery() {
                    const p = new URLSearchParams();
                    if (this.targetType) p.set('target_type', this.targetType);
                    if (this.targetId) p.set('target_id', this.targetId);
                    return p.toString();
                },

                // ========== 主拉取 ==========
                async refreshAll(reason) {
                    if (!this.targetId) return;
                    await Promise.all([
                        this.loadStatus(),
                        this.loadResults(),
                        this.loadHistory(),
                    ]);
                },

                async loadStatus() {
                    if (!this.targetId) return;
                    const data = await this.fetchJson('status', '/api/screener/status?' + this.buildQuery());
                    if (data) this.status = data;
                },

                async loadResults() {
                    if (!this.targetId) return;
                    const data = await this.fetchJson('results', '/api/screener/results?' + this.buildQuery());
                    if (!data) return;
                    const items = data.results || [];
                    // 列表长度变化或当前页无内容时回到首页；否则保留页码
                    const prevLen = (this.results || []).length;
                    this.results = items;
                    const totalPages = this.totalPages(items);
                    if (this.resultsPage > totalPages) this.resultsPage = Math.max(1, totalPages);
                    if (prevLen === 0 && items.length > 0) this.resultsPage = 1;
                },

                async loadHistory() {
                    if (!this.targetId) return;
                    const data = await this.fetchJson('history', '/api/screener/history?' + this.buildQuery());
                    if (!data) return;
                    this.history = data.history || [];
                    const totalPages = this.totalPages(this.history);
                    if (this.historyPage > totalPages) this.historyPage = Math.max(1, totalPages);
                },

                // ========== 运行 ==========
                async runScreener() {
                    if (!this.canRun) return;
                    this.isStarting = true;
                    try {
                        const res = await fetch('/api/screener/run?' + this.buildQuery());
                        const data = await res.json();
                        if (!res.ok) {
                            alert(data.message || data.error || '启动失败');
                            return;
                        }
                        await this.loadStatus();
                    } finally {
                        this.isStarting = false;
                    }
                },

                // ========== 轮询 ==========
                startPolling() {
                    this.scheduleStatus();
                    this.scheduleResults();
                },

                stopPolling() {
                    if (this.timers.status) clearTimeout(this.timers.status);
                    if (this.timers.results) clearTimeout(this.timers.results);
                    this.timers.status = this.timers.results = null;
                    this.cancelInflight();
                },

                scheduleStatus() {
                    if (this.timers.status) clearTimeout(this.timers.status);
                    this.timers.status = setTimeout(async () => {
                        await this.loadStatus();
                        this.scheduleStatus();
                    }, 1000);
                },

                scheduleResults() {
                    if (this.timers.results) clearTimeout(this.timers.results);
                    const interval = (this.status && this.status.running) ? 2000 : 5000;
                    this.timers.results = setTimeout(async () => {
                        const wasRunning = !!(this.status && this.status.running);
                        await this.loadResults();
                        if (!wasRunning) {
                            // 完成后也再刷一次历史，确保新运行进入列表
                            await this.loadHistory();
                        }
                        this.scheduleResults();
                    }, interval);
                },

                // ========== 详情 ==========
                async openDetail(item) {
                    const key = `${item.run_token || ''}|${item.run_date}|${item.run_time}`;
                    this.detail = {
                        run_date: item.run_date,
                        run_time: item.run_time,
                        target_type: item.target_type,
                        target_id: item.target_id,
                        target_name: item.target_name,
                        run_token: item.run_token,
                        _key: key,
                        results: null,
                    };
                    this.detailPage = 1;

                    const params = new URLSearchParams();
                    if (item.target_type) params.set('target_type', item.target_type);
                    if (item.target_id) params.set('target_id', item.target_id);
                    if (item.run_token) params.set('run_token', item.run_token);

                    const url = `/api/screener/history/${encodeURIComponent(item.run_date)}/${encodeURIComponent(item.run_time)}?${params.toString()}`;
                    const data = await this.fetchJson('detail', url);
                    if (!data) return;
                    // 若用户已切到另一条详情，就丢弃
                    if (!this.detail || this.detail._key !== key) return;
                    this.detail.results = data.results || [];
                },

                closeDetail() {
                    this.detail = null;
                    this.detailPage = 1;
                },

                isActiveHistory(item) {
                    if (!this.detail) return false;
                    const k = `${item.run_token || ''}|${item.run_date}|${item.run_time}`;
                    return this.detail._key === k;
                },

                // ========== 工具函数 ==========
                totalPages(list) {
                    if (!list || list.length === 0) return 1;
                    return Math.max(1, Math.ceil(list.length / this.PAGE_SIZE));
                },
                formatVol(v) {
                    const n = Number(v || 0);
                    if (!n) return '—';
                    if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
                    if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
                    return n.toFixed(0);
                },
                splitMatched(raw) {
                    if (!raw) return [];
                    if (Array.isArray(raw)) return raw;
                    return String(raw).split(',').map(s => s.trim()).filter(Boolean);
                },
                stockDetailUrl(code) {
                    if (!code) return '#';
                    return `/?code=${encodeURIComponent(code)}`;
                },
            };
        }
    </script>
</body>
</html>
