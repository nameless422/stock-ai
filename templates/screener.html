<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略选股</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #101826; color: #eef2ff; padding: 16px; }
        .container { max-width: 1080px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 16px; color: #ff8a65; }
        .sub { color: #8aa0bf; font-size: 14px; margin-bottom: 18px; line-height: 1.6; }
        .card { background: linear-gradient(180deg, #182235, #11192a); border: 1px solid #263248; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
        .toolbar { display: grid; grid-template-columns: 140px minmax(0, 1fr) auto auto; gap: 10px; align-items: center; }
        .btn, select { border-radius: 10px; border: none; padding: 10px 14px; font-size: 14px; }
        select { background: #0c1422; color: #eef2ff; border: 1px solid #2d3a52; }
        .btn { background: #ff8a65; color: #fff; cursor: pointer; }
        .btn.secondary { background: #20304a; color: #d4ddf0; }
        .btn.green { background: #32c48d; color: #081b16; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .meta { display: flex; gap: 12px; flex-wrap: wrap; color: #9eb0cc; font-size: 13px; margin-top: 12px; }
        .stat { background: #0c1422; border-radius: 12px; padding: 12px; min-width: 160px; }
        .stat-label { color: #7f91ae; font-size: 12px; }
        .stat-value { font-size: 24px; color: #fff; margin-top: 6px; }
        .list { display: grid; gap: 10px; }
        .item { background: #0d1626; border: 1px solid #202f47; border-radius: 14px; padding: 14px; }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .name { font-size: 18px; font-weight: 700; }
        .code { color: #7f91ae; font-size: 12px; margin-left: 8px; }
        .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #20304a; color: #9ed4ff; font-size: 12px; margin-right: 6px; margin-top: 8px; }
        .reason { color: #b7c4dc; font-size: 13px; margin-top: 10px; line-height: 1.6; }
        .empty { text-align: center; color: #7083a3; padding: 28px 12px; }
        .history-item { cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
        .history-item:hover { border-color: #ff8a65; transform: translateY(-1px); }
        .small { font-size: 12px; color: #8ea3c4; }
        .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .section-title h2 { font-size: 18px; }
        .status-live { color: #7ef0ba; font-weight: 600; }
        .pager { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .pager-info { color: #8ea3c4; font-size: 12px; }
        .pager-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .pager-btn { background: #20304a; color: #dbe6f9; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; }
        .pager-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .page-chip { background: #0c1422; border: 1px solid #2d3a52; color: #eef2ff; border-radius: 8px; padding: 8px 12px; font-size: 12px; min-width: 86px; text-align: center; }
        a { color: #9ed4ff; text-decoration: none; }
        @media (max-width: 720px) {
            body { padding: 12px; }
            h1 { font-size: 24px; }
            .sub { font-size: 13px; }
            .card { padding: 14px; border-radius: 14px; }
            .toolbar { grid-template-columns: 1fr; }
            .btn, select { width: 100%; min-height: 44px; }
            .meta { gap: 10px; }
            .stat { min-width: 0; flex: 1 1 calc(50% - 10px); }
            .stat-value { font-size: 20px; }
            .row { align-items: flex-start; }
            .name { font-size: 16px; }
            .pager { align-items: stretch; }
            .pager-info { width: 100%; }
            .pager-actions { width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .pager-btn, .page-chip { width: 100%; text-align: center; min-width: 0; }
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            h1 { font-size: 22px; }
            .card { padding: 12px; }
            .meta { display: grid; grid-template-columns: 1fr; }
            .stat { width: 100%; }
            .pager-actions { grid-template-columns: 1fr 1fr; gap: 6px; }
            .page-chip { grid-column: 1 / -1; order: -1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>策略选股</h1>
        <div class="sub">把筛选入口从单一固定规则升级成策略化执行。你可以按单个策略或策略组跑全市场扫描，并查看每次运行的命中结果与原因。</div>

        <div class="card">
            <div class="toolbar">
                <select id="targetType" onchange="onTargetTypeChange()">
                    <option value="strategy">按策略执行</option>
                    <option value="group">按策略组执行</option>
                </select>
                <select id="targetId"></select>
                <button class="btn" id="runBtn" onclick="runScreener()">加入队列</button>
                <a class="btn secondary" href="/strategies">管理策略</a>
            </div>
            <div class="meta">
                <div class="stat">
                    <div class="stat-label">当前目标</div>
                    <div class="stat-value" id="currentTarget">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最新命中</div>
                    <div class="stat-value" id="matchedCount">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">扫描进度</div>
                    <div class="stat-value" id="progressValue">0 / 0</div>
                </div>
            </div>
            <div class="meta">
                <span id="statusText">尚未开始运行</span>
                <span id="lastRunText"></span>
            </div>
        </div>

        <div class="card">
            <div class="section-title">
                <h2>任务队列</h2>
                <span class="small">最近的策略扫描任务与执行进度</span>
            </div>
            <div id="taskList" class="list">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">
                <h2>最新结果</h2>
                <span class="small" id="resultMeta"></span>
            </div>
            <div class="pager" id="resultPager" style="display:none;">
                <div class="pager-info" id="resultPagerInfo"></div>
                <div class="pager-actions">
                    <button class="pager-btn" id="resultFirstBtn" onclick="goToResultPage(1)">第一页</button>
                    <button class="pager-btn" id="resultPrevBtn" onclick="goToResultPage(resultState.page - 1)">上一页</button>
                    <span class="page-chip" id="resultPageChip">1 / 1</span>
                    <button class="pager-btn" id="resultNextBtn" onclick="goToResultPage(resultState.page + 1)">下一页</button>
                    <button class="pager-btn" id="resultLastBtn" onclick="goToResultPage(resultState.totalPages)">最后一页</button>
                </div>
            </div>
            <div id="resultList" class="list">
                <div class="empty">暂无结果</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">
                <h2>运行历史</h2>
                <span class="small">点击某次运行查看详情</span>
            </div>
            <div class="pager" id="historyPager" style="display:none;">
                <div class="pager-info" id="historyPagerInfo"></div>
                <div class="pager-actions">
                    <button class="pager-btn" id="historyFirstBtn" onclick="goToHistoryPage(1)">第一页</button>
                    <button class="pager-btn" id="historyPrevBtn" onclick="goToHistoryPage(historyState.page - 1)">上一页</button>
                    <span class="page-chip" id="historyPageChip">1 / 1</span>
                    <button class="pager-btn" id="historyNextBtn" onclick="goToHistoryPage(historyState.page + 1)">下一页</button>
                    <button class="pager-btn" id="historyLastBtn" onclick="goToHistoryPage(historyState.totalPages)">最后一页</button>
                </div>
            </div>
            <div id="historyList" class="list">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">
                <h2>运行详情</h2>
                <span class="small" id="detailMeta">请选择一条历史记录</span>
            </div>
            <div class="pager" id="detailPager" style="display:none;">
                <div class="pager-info" id="detailPagerInfo"></div>
                <div class="pager-actions">
                    <button class="pager-btn" id="detailFirstBtn" onclick="goToDetailPage(1)">第一页</button>
                    <button class="pager-btn" id="detailPrevBtn" onclick="goToDetailPage(detailState.page - 1)">上一页</button>
                    <span class="page-chip" id="detailPageChip">1 / 1</span>
                    <button class="pager-btn" id="detailNextBtn" onclick="goToDetailPage(detailState.page + 1)">下一页</button>
                    <button class="pager-btn" id="detailLastBtn" onclick="goToDetailPage(detailState.totalPages)">最后一页</button>
                </div>
            </div>
            <div id="detailList" class="list">
                <div class="empty">暂无详情</div>
            </div>
        </div>

        <div class="sub" style="margin-top:18px;">
            <a href="/">返回股票分析</a>
            <span style="margin:0 8px;">|</span>
            <a href="/vt">虚拟炒股</a>
        </div>
    </div>

    <script>
        let targetOptions = { strategies: [], groups: [] };
        let fastPollTimer = null;
        let slowPollTimer = null;
        let detailRequestKey = '';
        let resultRenderToken = 0;
        const RESULT_PAGE_SIZE = 10;
        const HISTORY_PAGE_SIZE = 10;
        const DETAIL_PAGE_SIZE = 10;
        let resultState = {
            items: [],
            page: 1,
            totalPages: 1,
        };
        let historyState = {
            items: [],
            page: 1,
            totalPages: 1,
        };
        let detailState = {
            items: [],
            page: 1,
            totalPages: 1,
        };
        let state = {
            lastStatusKey: '',
            lastResultKey: '',
            lastHistoryKey: '',
            lastTaskKey: '',
            lastMatchedCount: -1,
            lastRunning: false,
            currentDetailKey: '',
        };

        function qs() {
            const targetType = document.getElementById('targetType').value;
            const targetId = document.getElementById('targetId').value;
            const params = new URLSearchParams();
            if (targetType) params.set('target_type', targetType);
            if (targetId) params.set('target_id', targetId);
            return params.toString();
        }

        function currentTargetName() {
            const targetType = document.getElementById('targetType').value;
            const targetId = Number(document.getElementById('targetId').value || 0);
            const list = targetType === 'group' ? targetOptions.groups : targetOptions.strategies;
            const found = list.find(item => Number(item.id) === targetId);
            return found ? found.name : '-';
        }

        function resultSignature(items) {
            return (items || []).map(item => `${item.code}:${item.score}:${item.reason}:${(item.matched_strategies || []).join('|')}`).join('||');
        }

        function historySignature(items) {
            return (items || []).map(item => `${item.run_token || ''}:${item.run_date}:${item.run_time}:${item.target_type}:${item.target_id}:${item.matched_count}`).join('||');
        }

        function taskSignature(items) {
            return (items || []).map(item => `${item.id}:${item.status}:${item.progress_current}:${item.progress_total}:${item.result_text}:${item.error_text}`).join('||');
        }

        function updatePager(baseId, pageState, pageSize) {
            const pager = document.getElementById(baseId + 'Pager');
            const total = pageState.items.length;
            pageState.totalPages = Math.max(1, Math.ceil(total / pageSize));
            pageState.page = Math.min(Math.max(1, pageState.page), pageState.totalPages);
            if (total <= pageSize) {
                pager.style.display = 'none';
                return;
            }
            pager.style.display = 'flex';
            document.getElementById(baseId + 'PagerInfo').textContent = `共 ${total} 条， 每页 ${pageSize} 条`;
            document.getElementById(baseId + 'PageChip').textContent = `${pageState.page} / ${pageState.totalPages}`;
            document.getElementById(baseId + 'FirstBtn').disabled = pageState.page === 1;
            document.getElementById(baseId + 'PrevBtn').disabled = pageState.page === 1;
            document.getElementById(baseId + 'NextBtn').disabled = pageState.page === pageState.totalPages;
            document.getElementById(baseId + 'LastBtn').disabled = pageState.page === pageState.totalPages;
        }

        function updateResultPager() {
            updatePager('result', resultState, RESULT_PAGE_SIZE);
        }

        function goToResultPage(page) {
            const nextPage = Math.min(Math.max(1, page), resultState.totalPages);
            if (nextPage === resultState.page) {
                return;
            }
            resultState.page = nextPage;
            updateResultPager();
            renderResultsPage();
        }

        function goToHistoryPage(page) {
            const nextPage = Math.min(Math.max(1, page), historyState.totalPages);
            if (nextPage === historyState.page) {
                return;
            }
            historyState.page = nextPage;
            updatePager('history', historyState, HISTORY_PAGE_SIZE);
            renderHistoryPage();
        }

        function goToDetailPage(page) {
            const nextPage = Math.min(Math.max(1, page), detailState.totalPages);
            if (nextPage === detailState.page) {
                return;
            }
            detailState.page = nextPage;
            updatePager('detail', detailState, DETAIL_PAGE_SIZE);
            renderDetailPage();
        }

        function resultCardTemplate(item) {
            return `
                <div class="item">
                    <div class="row">
                        <div>
                            <span class="name">${item.name}</span>
                            <span class="code">${item.code}</span>
                        </div>
                        <div class="small">评分 ${Number(item.score || 0).toFixed(1)}</div>
                    </div>
                    <div>${(item.matched_strategies || []).map(name => `<span class="pill">${name}</span>`).join('') || '<span class="pill">未返回命中策略</span>'}</div>
                    <div class="reason">${item.reason || item.weekly || '-'}</div>
                    <div class="small" style="margin-top:10px;">成交量 ${formatVol(item.current_vol)} | DIF ${Number(item.dif || 0).toFixed(2)} | DEA ${Number(item.dea || 0).toFixed(2)}</div>
                </div>
            `;
        }

        function renderResultsPage() {
            const el = document.getElementById('resultList');
            resultRenderToken += 1;
            const currentToken = resultRenderToken;
            const items = resultState.items || [];
            if (!items || items.length === 0) {
                el.innerHTML = '<div class="empty">暂无命中结果</div>';
                return;
            }
            const startIndex = (resultState.page - 1) * RESULT_PAGE_SIZE;
            const pageItems = items.slice(startIndex, startIndex + RESULT_PAGE_SIZE);
            const firstChunkSize = 20;
            const chunkSize = 40;
            el.innerHTML = pageItems.slice(0, firstChunkSize).map(resultCardTemplate).join('');
            if (pageItems.length <= firstChunkSize) {
                return;
            }

            let cursor = firstChunkSize;
            const appendChunk = () => {
                if (currentToken !== resultRenderToken) {
                    return;
                }
                const nextSlice = pageItems.slice(cursor, cursor + chunkSize);
                if (nextSlice.length === 0) {
                    return;
                }
                el.insertAdjacentHTML('beforeend', nextSlice.map(resultCardTemplate).join(''));
                cursor += chunkSize;
                if (cursor < pageItems.length) {
                    if (window.requestIdleCallback) {
                        window.requestIdleCallback(appendChunk, { timeout: 120 });
                    } else {
                        window.setTimeout(appendChunk, 16);
                    }
                }
            };

            if (window.requestIdleCallback) {
                window.requestIdleCallback(appendChunk, { timeout: 120 });
            } else {
                window.setTimeout(appendChunk, 16);
            }
        }

        function renderResults(items, preservePage = true) {
            const previousFirstCode = (resultState.items[(resultState.page - 1) * RESULT_PAGE_SIZE] || {}).code;
            resultState.items = items || [];
            if (!preservePage) {
                resultState.page = 1;
            } else if (previousFirstCode) {
                const newIndex = resultState.items.findIndex(item => item.code === previousFirstCode);
                if (newIndex >= 0) {
                    resultState.page = Math.floor(newIndex / RESULT_PAGE_SIZE) + 1;
                }
            }
            updateResultPager();
            renderResultsPage();
        }

        function renderHistoryPage() {
            const el = document.getElementById('historyList');
            const items = historyState.items || [];
            if (!items || items.length === 0) {
                el.innerHTML = '<div class="empty">暂无历史记录</div>';
                return;
            }
            const startIndex = (historyState.page - 1) * HISTORY_PAGE_SIZE;
            const pageItems = items.slice(startIndex, startIndex + HISTORY_PAGE_SIZE);
            el.innerHTML = pageItems.map(item => `
                <div class="item history-item" onclick="loadDetail('${item.run_date}', '${item.run_time}', '${item.target_type || ''}', '${item.target_id || ''}', '${item.run_token || ''}')">
                    <div class="row">
                        <div>
                            <div class="name" style="font-size:16px;">${item.target_name || '未命名目标'}</div>
                            <div class="small">${item.run_date} ${item.run_time} | ${item.target_type === 'group' ? '策略组' : '策略'} | ${item.target_logic || '-'}</div>
                            <div class="small">${item.failure_summary || ''}</div>
                        </div>
                        <div class="small">命中 ${item.matched_count || 0} / ${item.total_stocks || 0}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory(items, preservePage = true) {
            if (!preservePage) {
                historyState.page = 1;
            }
            historyState.items = items || [];
            updatePager('history', historyState, HISTORY_PAGE_SIZE);
            renderHistoryPage();
        }

        function renderTasks(items) {
            const el = document.getElementById('taskList');
            if (!items || items.length === 0) {
                el.innerHTML = '<div class="empty">暂无任务</div>';
                return;
            }
            el.innerHTML = items.map(item => {
                const summary = item.progress_message || item.result_text || item.error_text || '-';
                const progress = item.progress_total ? `${item.progress_current || 0} / ${item.progress_total}` : '-';
                const matched = item.matched_count || 0;
                const timeText = item.completed_at || item.started_at || item.created_at || '-';
                return `
                    <div class="item">
                        <div class="row">
                            <div>
                                <div class="name" style="font-size:16px;">${item.target_name || '未命名目标'}</div>
                                <div class="small">任务 #${item.id} | ${item.status || '-'} | ${timeText}</div>
                            </div>
                            <div class="small">命中 ${matched}</div>
                        </div>
                        <div>
                            <span class="pill">${item.task_type || 'screening'}</span>
                            <span class="pill">进度 ${progress}</span>
                            <span class="pill">${item.target_type === 'group' ? '策略组' : '策略'}</span>
                        </div>
                        <div class="reason">${summary}</div>
                    </div>
                `;
            }).join('');
        }

        function renderDetailPage() {
            const el = document.getElementById('detailList');
            const items = detailState.items || [];
            if (!items || items.length === 0) {
                el.innerHTML = '<div class="empty">本次运行没有命中股票</div>';
                return;
            }
            const startIndex = (detailState.page - 1) * DETAIL_PAGE_SIZE;
            const pageItems = items.slice(startIndex, startIndex + DETAIL_PAGE_SIZE);
            el.innerHTML = pageItems.map(item => `
                <div class="item">
                    <div class="row">
                        <div>
                            <span class="name">${item.stock_name}</span>
                            <span class="code">${item.stock_code}</span>
                        </div>
                        <div class="small">评分 ${Number(item.score || 0).toFixed(1)}</div>
                    </div>
                    <div>${String(item.matched_strategies || '').split(',').filter(Boolean).map(name => `<span class="pill">${name.trim()}</span>`).join('')}</div>
                    <div class="reason">${item.weekly_condition || '-'}</div>
                </div>
            `).join('');
        }

        function renderDetail(items, preservePage = false) {
            if (!preservePage) {
                detailState.page = 1;
            }
            detailState.items = items || [];
            updatePager('detail', detailState, DETAIL_PAGE_SIZE);
            renderDetailPage();
        }

        function formatVol(v) {
            const value = Number(v || 0);
            if (!value) return '-';
            if (value >= 100000000) return (value / 100000000).toFixed(2) + '亿';
            if (value >= 10000) return (value / 10000).toFixed(2) + '万';
            return value.toFixed(0);
        }

        async function loadTargets() {
            const res = await fetch('/api/screener/targets');
            targetOptions = await res.json();
            onTargetTypeChange();
        }

        function onTargetTypeChange() {
            const type = document.getElementById('targetType').value;
            const select = document.getElementById('targetId');
            const items = type === 'group' ? targetOptions.groups : targetOptions.strategies.filter(item => item.enabled !== 0);
            select.innerHTML = items.map(item => `<option value="${item.id}">${item.name}</option>`).join('');
            document.getElementById('currentTarget').textContent = currentTargetName();
            refreshAll();
        }

        async function loadStatus() {
            const res = await fetch('/api/screener/status?' + qs());
            const data = await res.json();
            const statusKey = [
                data.running ? '1' : '0',
                data.time || '',
                data.processed || 0,
                data.total_stocks || 0,
                data.matched_count || 0,
                data.target_type || '',
                data.target_id || '',
            ].join('|');
            if (statusKey === state.lastStatusKey) {
                return data;
            }
            state.lastStatusKey = statusKey;
            document.getElementById('currentTarget').textContent = data.target_name || currentTargetName();
            document.getElementById('matchedCount').textContent = data.matched_count || 0;
            document.getElementById('progressValue').textContent = `${data.processed || 0} / ${data.total_stocks || 0}`;
            document.getElementById('statusText').innerHTML = data.queued
                ? `任务排队中${data.progress_message ? ' · ' + data.progress_message : ''}`
                : data.running
                    ? `<span class="status-live">正在扫描全市场...</span>${data.progress_message ? ' · ' + data.progress_message : ''}`
                    : (data.status === 'completed' ? `最近一次运行已完成${data.progress_message ? ' · ' + data.progress_message : ''}` : (data.status === 'failed' ? `最近任务失败 · ${data.error || data.progress_message || '-'}` : '当前没有运行中的任务'));
            document.getElementById('lastRunText').textContent = data.time ? `最近运行：${data.time}` : '';
            document.getElementById('runBtn').disabled = false;
            if (data.running && (!state.lastRunning || data.matched_count !== state.lastMatchedCount)) {
                loadResults(true);
            }
            if (!data.running && state.lastRunning) {
                loadResults(true);
                loadHistory(true);
                loadTasks(true);
            }
            state.lastMatchedCount = data.matched_count || 0;
            state.lastRunning = !!data.running;
            return data;
        }

        async function loadResults(force = false) {
            const res = await fetch('/api/screener/results?' + qs());
            const data = await res.json();
            const signature = `${data.time || ''}#${resultSignature(data.results)}`;
            if (!force && signature === state.lastResultKey) {
                return;
            }
            state.lastResultKey = signature;
            const summary = data.failure_summary ? ` | 未命中原因: ${data.failure_summary}` : '';
            document.getElementById('resultMeta').textContent = data.time ? `${data.target_name || '-'} | ${data.time} | ${data.total} 只${summary}` : '';
            renderResults(data.results || [], !force);
        }

        async function loadHistory(force = false) {
            const res = await fetch('/api/screener/history?' + qs());
            const data = await res.json();
            const signature = historySignature(data.history);
            if (!force && signature === state.lastHistoryKey) {
                return;
            }
            state.lastHistoryKey = signature;
            renderHistory(data.history || [], !force);
        }

        async function loadTasks(force = false) {
            const res = await fetch('/api/tasks?task_type=screening&limit=12&' + qs());
            const data = await res.json();
            const signature = taskSignature(data.tasks || []);
            if (!force && signature === state.lastTaskKey) {
                return;
            }
            state.lastTaskKey = signature;
            renderTasks(data.tasks || []);
        }

        async function loadDetail(runDate, runTime, targetType, targetId, runToken = '') {
            const params = new URLSearchParams();
            if (targetType) params.set('target_type', targetType);
            if (targetId) params.set('target_id', targetId);
            if (runToken) params.set('run_token', runToken);
            detailRequestKey = `${runToken}|${runDate}|${runTime}|${targetType}|${targetId}`;
            state.currentDetailKey = detailRequestKey;
            const res = await fetch(`/api/screener/history/${runDate}/${encodeURIComponent(runTime)}?` + params.toString());
            const data = await res.json();
            if (state.currentDetailKey !== detailRequestKey) {
                return;
            }
            document.getElementById('detailMeta').textContent = `${runDate} ${runTime} | 共 ${data.total || 0} 只`;
            renderDetail(data.results || [], false);
        }

        async function runScreener() {
            const res = await fetch('/api/screener/run?' + qs());
            const data = await res.json();
            if (!res.ok) {
                alert(data.message || data.error || '启动失败');
                return;
            }
            startPolling();
            await loadTasks(true);
            await loadStatus();
        }

        async function refreshAll() {
            await loadStatus();
            await loadTasks(true);
            await loadResults(true);
            await loadHistory(true);
        }

        function stopPolling() {
            if (fastPollTimer) clearInterval(fastPollTimer);
            if (slowPollTimer) clearInterval(slowPollTimer);
            fastPollTimer = null;
            slowPollTimer = null;
        }

        function startPolling() {
            stopPolling();
            fastPollTimer = setInterval(() => {
                loadStatus();
            }, 1000);
            slowPollTimer = setInterval(async () => {
                if (state.lastRunning) {
                    await loadTasks();
                    await loadResults();
                } else {
                    await loadTasks();
                    await loadResults();
                    await loadHistory();
                }
            }, 5000);
        }

        document.getElementById('targetId').addEventListener('change', () => {
            document.getElementById('currentTarget').textContent = currentTargetName();
            state.lastStatusKey = '';
            state.lastResultKey = '';
            state.lastHistoryKey = '';
            state.lastMatchedCount = -1;
            resultState.page = 1;
            historyState.page = 1;
            detailState.page = 1;
            refreshAll();
        });

        (async function init() {
            await loadTargets();
            startPolling();
        })();
    </script>
</body>
</html>
