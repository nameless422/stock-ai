<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- mobile-template: vt -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚拟炒股</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #07101c;
            --panel: rgba(18, 31, 49, 0.94);
            --panel-soft: #0f1a2c;
            --chip: #14233a;
            --line: rgba(129, 154, 190, 0.16);
            --text: #eef4ff;
            --muted: #8ca2c4;
            --accent: #ff7c6b;
            --accent-2: #ffc76b;
            --green: #7ef0ba;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 124, 107, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(126, 240, 186, 0.1), transparent 26%),
                linear-gradient(180deg, #0d1727 0%, #07101c 55%, #050b14 100%);
        }
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px 14px 24px;
        }
        .hero {
            padding: 4px 2px 16px;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 199, 107, 0.12);
            color: var(--accent-2);
            font-size: 12px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        .hero-sub {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.75;
        }
        .surface {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }
        .card {
            background: linear-gradient(180deg, rgba(18, 31, 49, 0.98), rgba(11, 20, 34, 0.98));
            border: 1px solid rgba(129, 154, 190, 0.14);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .hero-card {
            padding: 16px;
            margin-bottom: 14px;
        }
        .hero-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .hero-card-name {
            font-size: 18px;
            font-weight: 700;
        }
        .hero-card-meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
            margin-top: 4px;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 9px;
            border-radius: 999px;
            background: rgba(255, 124, 107, 0.18);
            color: #ffd5cf;
            font-size: 11px;
            font-weight: 700;
        }
        .mini-nav {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .mini-nav a, .mini-nav button {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(129, 154, 190, 0.12);
            background: #152237;
            color: #d7e4ff;
            font-size: 12px;
        }
        .mini-nav button { cursor: pointer; }
        .account-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-top: 12px;
        }
        .account-chip {
            min-width: 150px;
            padding: 10px 12px;
            border-radius: 16px;
            background: #101c2f;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
        }
        .account-chip.active {
            border-color: rgba(255, 199, 107, 0.52);
            background: linear-gradient(135deg, rgba(255, 199, 107, 0.12), rgba(20, 35, 58, 0.96));
        }
        .account-chip .balance {
            display: block;
            color: var(--green);
            font-size: 11px;
            margin-top: 4px;
        }
        .add-account-btn {
            min-width: 112px;
            padding: 10px 12px;
            border-radius: 16px;
            border: 1px dashed rgba(129, 154, 190, 0.3);
            background: rgba(18, 31, 49, 0.72);
            color: var(--muted);
            cursor: pointer;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-label {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--green);
            word-break: break-word;
        }
        .card-value.red { color: #ff8f84; }
        .section-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            padding: 8px;
            margin-bottom: 14px;
        }
        .tab {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            border-radius: 14px;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .tab.active {
            background: linear-gradient(135deg, rgba(255, 124, 107, 0.18), rgba(255, 199, 107, 0.14));
            color: var(--text);
            border: 1px solid rgba(255, 199, 107, 0.3);
            font-weight: 700;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-title h2 {
            font-size: 17px;
        }
        .section-meta {
            color: var(--muted);
            font-size: 12px;
        }
        .empty {
            padding: 24px 12px;
            text-align: center;
            color: var(--muted);
            line-height: 1.7;
            font-size: 13px;
        }
        .position-item {
            background: linear-gradient(180deg, rgba(17, 30, 49, 0.96), rgba(10, 19, 34, 0.96));
            border: 1px solid rgba(129, 154, 190, 0.12);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .pos-header, .admin-user-header, .trade-item, .admin-account-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .pos-name { font-weight: 700; font-size: 15px; }
        .pos-code { color: var(--muted); font-size: 11px; margin-left: 6px; }
        .pos-profit { font-weight: 700; font-size: 15px; text-align: right; }
        .pos-profit.up { color: #ff8f84; }
        .pos-profit.down { color: var(--green); }
        .pos-detail {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
        }
        .pos-detail span {
            display: block;
            padding: 10px;
            border-radius: 14px;
            background: rgba(10, 18, 30, 0.48);
            text-align: center;
        }
        .pos-detail .val {
            display: block;
            color: var(--text);
            font-size: 13px;
            margin-top: 4px;
        }
        .trade-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(129, 154, 190, 0.1);
            font-size: 13px;
        }
        .trade-item:last-child { border-bottom: none; }
        .trade-type {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .trade-type.buy { background: rgba(255, 124, 107, 0.18); color: #ffd5cf; }
        .trade-type.sell { background: rgba(126, 240, 186, 0.18); color: #c8ffe6; }
        .trade-panel {
            padding: 16px;
        }
        .trade-stock {
            text-align: center;
            padding: 16px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 124, 107, 0.14), rgba(255, 199, 107, 0.08), rgba(18, 31, 49, 0.98));
            border: 1px solid rgba(255, 199, 107, 0.18);
            margin-bottom: 12px;
        }
        .trade-stock-name { font-size: 22px; font-weight: 800; }
        .trade-stock-code { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .trade-stock-price { color: var(--accent-2); font-size: 24px; font-weight: 800; margin-top: 6px; }
        .trade-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .trade-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .trade-info {
            padding: 12px;
            border-radius: 16px;
            background: rgba(10, 18, 30, 0.48);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.85;
            margin-bottom: 12px;
        }
        .btn {
            min-height: 46px;
            border: none;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            background: linear-gradient(135deg, #1b2b44, #152237);
            width: 100%;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-green { background: linear-gradient(135deg, var(--green), #4dc993); color: #0a2219; font-weight: 700; }
        .btn-blue { background: linear-gradient(135deg, #254774, #173151); }
        .btn-red { background: linear-gradient(135deg, #ff8f84, #ff6e7d); color: #351010; font-weight: 700; }
        .btn-small {
            min-height: 34px;
            width: auto;
            padding: 0 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        input, select {
            width: 100%;
            min-height: 46px;
            border-radius: 14px;
            border: 1px solid rgba(129, 154, 190, 0.18);
            background: #101b2f;
            color: var(--text);
            padding: 0 14px;
            font-size: 16px;
            outline: none;
        }
        .auth-box {
            margin-top: 30px;
        }
        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px;
            margin-bottom: 14px;
        }
        .auth-tab {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            color: var(--muted);
            cursor: pointer;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, rgba(255, 124, 107, 0.18), rgba(255, 199, 107, 0.14));
            color: var(--text);
            border: 1px solid rgba(255, 199, 107, 0.3);
            font-weight: 700;
        }
        .auth-form input { margin-bottom: 10px; }
        .auth-form .btn { margin-top: 4px; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, rgba(18, 31, 49, 0.98), rgba(11, 20, 34, 0.98));
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 18px;
        }
        .modal h3 {
            margin-bottom: 12px;
            font-size: 18px;
            color: var(--accent-2);
        }
        .modal input, .modal select { margin-bottom: 10px; }
        .modal-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .admin-user {
            padding: 14px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(17, 30, 49, 0.96), rgba(10, 19, 34, 0.96));
            border: 1px solid rgba(129, 154, 190, 0.12);
            margin-bottom: 10px;
        }
        .admin-account-list {
            font-size: 12px;
            color: var(--muted);
            margin-top: 10px;
        }
        .admin-account-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(129, 154, 190, 0.1);
        }
        .admin-account-item:last-child { border-bottom: none; }
        .error-msg, .success-msg {
            padding: 12px 14px;
            border-radius: 16px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .error-msg { background: rgba(255, 124, 107, 0.18); color: #ffd5cf; }
        .success-msg { background: rgba(126, 240, 186, 0.16); color: #c8ffe6; }
        a { color: #ffcf82; text-decoration: none; }
        @media (max-width: 430px) {
            .page { padding: 14px 12px 20px; }
            h1 { font-size: 24px; }
            .mini-nav, .summary-grid, .section-tabs, .trade-switch, .trade-inputs, .modal-btns { grid-template-columns: 1fr; }
            .pos-detail { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="eyebrow">Mobile Edition</div>
            <h1>虚拟炒股舱</h1>
            <div class="hero-sub">把账户、持仓、交易和管理做成更像手机 App 的单列流程。核心信息靠前，操作路径更短，按钮和输入都按触屏尺寸重排。</div>
        </div>

        <div id="msgBox"></div>

        <div id="userBar" class="surface hero-card" style="display:none">
            <div class="hero-card-top">
                <div>
                    <div class="hero-card-name" id="userName"></div>
                    <div class="hero-card-meta">多账户练习、快速切仓、交易回放都集中在这里</div>
                </div>
                <span id="adminBadge" class="admin-badge" style="display:none;">管理员</span>
            </div>
            <div class="mini-nav">
                <a href="/">股票分析</a>
                <a href="/screener">策略选股</a>
                <a href="/strategies">策略管理</a>
                <button style="grid-column:1 / -1;" onclick="logout()">退出登录</button>
            </div>
            <div class="account-strip" id="accountSelector"></div>
        </div>

        <div id="authPanel" class="panel active">
            <div class="surface card auth-box">
                <div class="auth-tabs surface">
                    <div class="auth-tab active" onclick="switchAuthTab('login')">登录</div>
                    <div class="auth-tab" onclick="switchAuthTab('register')">注册</div>
                </div>
                <div id="loginForm" class="auth-form">
                    <input type="text" id="loginUsername" placeholder="用户名" />
                    <input type="password" id="loginPassword" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()" />
                    <button class="btn btn-green" onclick="doLogin()">登录</button>
                    <div style="margin-top:12px; text-align:center; font-size:12px; color:var(--muted);">
                        <div>管理员测试账号：admin / admin</div>
                    </div>
                </div>
                <div id="registerForm" class="auth-form" style="display:none">
                    <input type="text" id="regUsername" placeholder="设置用户名 (2-20字符)" />
                    <input type="password" id="regPassword" placeholder="设置密码 (至少4字符)" />
                    <button class="btn btn-green" onclick="doRegister()">注册并登录</button>
                </div>
            </div>
        </div>

        <div id="mainPanel" class="panel">
            <div class="summary-grid" id="summaryGrid">
                <div class="card">
                    <div class="stat-label">总资产</div>
                    <div class="card-value" id="totalAssets">-</div>
                </div>
                <div class="card">
                    <div class="stat-label">持仓市值</div>
                    <div class="card-value" id="marketValue">-</div>
                </div>
                <div class="card">
                    <div class="stat-label">现金余额</div>
                    <div class="card-value" id="cashBalance" style="color:var(--text)">-</div>
                </div>
                <div class="card">
                    <div class="stat-label">累计盈亏</div>
                    <div class="card-value" id="totalProfit">-</div>
                </div>
            </div>

            <div class="surface section-tabs">
                <div class="tab active" onclick="switchTab('positions')">持仓</div>
                <div class="tab" onclick="switchTab('trades')">交易</div>
                <div class="tab" onclick="switchTab('trade')">下单</div>
                <div class="tab" id="adminTab" style="display:none" onclick="switchTab('admin')">管理</div>
            </div>

            <div id="positionsPanel" class="panel active">
                <div class="card">
                    <div class="section-title">
                        <h2>当前持仓</h2>
                        <div class="section-meta">实时盈亏概览</div>
                    </div>
                    <div id="positionsList"><div class="empty">加载中...</div></div>
                </div>
            </div>

            <div id="tradesPanel" class="panel">
                <div class="card">
                    <div class="section-title">
                        <h2>交易记录</h2>
                        <div class="section-meta">最近成交回放</div>
                    </div>
                    <div id="tradesList"><div class="empty">加载中...</div></div>
                </div>
            </div>

            <div id="tradePanel" class="panel">
                <div class="surface trade-panel">
                    <div class="trade-stock">
                        <div class="trade-stock-name" id="tradeStockName">-</div>
                        <div class="trade-stock-code" id="tradeStockCode">-</div>
                        <div class="trade-stock-price" id="tradeStockPrice">-</div>
                    </div>
                    <div class="trade-switch">
                        <button class="btn btn-green" id="buyBtn" onclick="showBuy()">买入</button>
                        <button class="btn btn-blue" id="sellBtn" onclick="showSell()">卖出</button>
                    </div>
                    <div id="tradeForm" style="display:none;">
                        <div class="trade-inputs">
                            <input type="number" id="tradeShares" placeholder="股数 (100倍数)" min="100" step="100" />
                            <input type="number" id="tradePrice" placeholder="价格" step="0.01" />
                        </div>
                        <div class="trade-info" id="tradeInfo">输入股数和价格</div>
                        <button class="btn btn-green" id="tradeSubmitBtn" onclick="doTrade()">确认交易</button>
                    </div>
                </div>
                <div class="card" id="quickPosTrade" style="margin-top:12px;"></div>
            </div>

            <div id="adminPanel" class="panel">
                <div class="surface card">
                    <div class="trade-switch" style="margin-bottom:14px;">
                        <button class="btn btn-blue" onclick="showAdminTab('users')" id="adminTabUsers">用户列表</button>
                        <button class="btn secondary" onclick="showAdminTab('accounts')" id="adminTabAccounts" style="background:#18263d;">账户管理</button>
                    </div>
                    <div id="adminUsers"><div class="empty">加载中...</div></div>
                    <div id="adminAccountDetail" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="newAccountModal">
        <div class="modal">
            <h3>新建虚拟账户</h3>
            <input type="text" id="newAccountName" placeholder="账户名称，如：账户B" />
            <div style="font-size:12px; color:var(--muted); margin-bottom:12px;">每个账户初始资金 50 万元</div>
            <div class="modal-btns">
                <button class="btn btn-blue" onclick="closeNewAccountModal()">取消</button>
                <button class="btn btn-green" onclick="doCreateAccount()">创建</button>
            </div>
        </div>
    </div>

<script>
const COOKIE = "vt_session";
let currentUser = null;
let accounts = [];
let currentAccountId = null;
let tradeMode = "buy";
let currentTradePrice = 0;

document.addEventListener("DOMContentLoaded", async () => {
    await checkSession();
});

function switchAuthTab(tab) {
    document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
    });
    document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
    document.getElementById("registerForm").style.display = tab === "register" ? "block" : "none";
}

async function doLogin() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!username || !password) { showMsg("请输入用户名和密码", "error"); return; }
    const res = await fetch("/api/vt/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "登录失败", "error"); return; }
    document.cookie = `${COOKIE}=${data.token}; path=/; max-age=2592000`;
    await loadUserData();
}

async function doRegister() {
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    if (!username || !password) { showMsg("请输入用户名和密码", "error"); return; }
    const res = await fetch("/api/vt/register", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "注册失败", "error"); return; }
    await doLogin();
}

async function logout() {
    await fetch("/api/vt/logout", { method: "POST" });
    document.cookie = `${COOKIE}=; path=/; max-age=0`;
    location.reload();
}

async function checkSession() {
    const res = await fetch("/api/vt/me");
    const data = await res.json();
    const stored = sessionStorage.getItem('vt_stock');
    let preStock = null;
    if (stored) { try { preStock = JSON.parse(stored); } catch(e) {} }

    if (data.logged_in) {
        currentUser = data;
        accounts = data.accounts || [];
        if (accounts.length > 0) currentAccountId = accounts[0].id;
        renderUserBar();
        renderMainPanel();
        loadAccountSummary();
        if (preStock) {
            sessionStorage.removeItem('vt_stock');
            setTradeStock(preStock.code, preStock.name, preStock.price);
        }
    } else {
        renderAuthPanel();
        if (preStock) {
            sessionStorage.removeItem('vt_stock');
            setTradeStock(preStock.code, preStock.name, preStock.price);
        }
    }
}

function renderAuthPanel() {
    document.getElementById("authPanel").classList.add("active");
    document.getElementById("mainPanel").classList.remove("active");
    document.getElementById("userBar").style.display = "none";
}

function renderUserBar() {
    document.getElementById("userBar").style.display = "block";
    document.getElementById("userName").textContent = currentUser.username;
    document.getElementById("adminBadge").style.display = currentUser.is_admin ? "inline-flex" : "none";
    document.getElementById("adminTab").style.display = currentUser.is_admin ? "flex" : "none";

    const sel = document.getElementById("accountSelector");
    sel.innerHTML = accounts.map(a => `
        <div class="account-chip ${a.id == currentAccountId ? "active" : ""}" onclick="selectAccount(${a.id})">
            ${a.account_name}
            <span class="balance">${(a.balance/10000).toFixed(1)}万</span>
        </div>
    `).join("");
    sel.innerHTML += `<div class="add-account-btn" onclick="openNewAccountModal()">+ 新账户</div>`;
}

async function selectAccount(id) {
    currentAccountId = id;
    document.querySelectorAll(".account-chip").forEach(c => c.classList.remove("active"));
    event.target.closest(".account-chip").classList.add("active");
    await loadAccountSummary();
}

function renderMainPanel() {
    document.getElementById("authPanel").classList.remove("active");
    document.getElementById("mainPanel").classList.add("active");
}

async function loadUserData() {
    await checkSession();
}

async function loadAccountSummary() {
    if (!currentAccountId) return;
    const res = await fetch(`/api/vt/account/${currentAccountId}`);
    const data = await res.json();
    if (data.error) { showMsg(data.error, "error"); return; }

    document.getElementById("totalAssets").textContent = fmtMoney(data.total_assets);
    document.getElementById("marketValue").textContent = fmtMoney(data.market_value);
    document.getElementById("cashBalance").textContent = fmtMoney(data.balance);

    const profit = data.total_profit;
    const pct = data.total_profit_pct;
    const profitEl = document.getElementById("totalProfit");
    profitEl.textContent = fmtMoney(profit) + " (" + (profit >= 0 ? "+" : "") + pct + "%)";
    profitEl.className = "card-value " + (profit >= 0 ? "red" : "");

    renderPositions(data.positions);
    await loadTrades();
    renderQuickPosTrade(data.positions);
}

async function loadTrades() {
    const res = await fetch(`/api/vt/account/${currentAccountId}/trades`);
    const data = await res.json();
    renderTrades(data.trades || []);
}

function renderPositions(positions) {
    const el = document.getElementById("positionsList");
    if (!positions || positions.length === 0) {
        el.innerHTML = '<div class="empty">暂无持仓，去买入股票吧。</div>';
        return;
    }
    el.innerHTML = positions.map(p => `
        <div class="position-item">
            <div class="pos-header">
                <div>
                    <span class="pos-name">${p.stock_name}</span>
                    <span class="pos-code">${p.stock_code}</span>
                </div>
                <div class="pos-profit ${p.profit >= 0 ? "up" : "down"}">
                    ${p.profit >= 0 ? "+" : ""}${fmtMoney(p.profit)} (${p.profit_pct}%)
                </div>
            </div>
            <div class="pos-detail">
                <span>持仓<div class="val">${p.shares}股</div></span>
                <span>成本价<div class="val">${p.avg_cost.toFixed(2)}</div></span>
                <span>现价<div class="val">${p.current_price.toFixed(2)}</div></span>
            </div>
        </div>
    `).join("");
}

function renderTrades(trades) {
    const el = document.getElementById("tradesList");
    if (!trades || trades.length === 0) {
        el.innerHTML = '<div class="empty">暂无交易记录</div>';
        return;
    }
    el.innerHTML = trades.map(t => {
        const date = new Date(t.traded_at).toLocaleString("zh-CN", {hour12:false});
        return `
        <div class="trade-item">
            <div>
                <span class="trade-type ${t.trade_type.toLowerCase()}">${t.trade_type === "BUY" ? "买入" : "卖出"}</span>
                <strong style="display:block; margin-top:8px;">${t.stock_name}</strong>
                <span style="color:var(--muted); font-size:12px;">${t.stock_code}</span>
            </div>
            <div style="text-align:right; font-size:12px; color:var(--muted);">
                <div style="color:var(--text);">${t.shares}股 @ ${t.price.toFixed(2)}</div>
                <div style="margin-top:4px;">${date}</div>
            </div>
        </div>
        `;
    }).join("");
}

function switchTab(tab) {
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".panel");
    tabs.forEach((t, i) => {
        const tabNames = ["positions", "trades", "trade", "admin"];
        t.classList.toggle("active", tabNames[i] === tab);
    });
    const panelNames = ["positionsPanel", "tradesPanel", "tradePanel", "adminPanel"];
    panels.forEach(p => {
        const name = p.id.replace("Panel", "");
        p.classList.toggle("active", panelNames.indexOf(p.id) >= 0 && name === tab);
    });

    if (tab === "admin" && currentUser && currentUser.is_admin) loadAdminUsers();
}

function showBuy() {
    tradeMode = "buy";
    document.getElementById("tradeForm").style.display = "block";
    document.getElementById("tradeSubmitBtn").textContent = "确认买入";
    document.getElementById("tradeSubmitBtn").className = "btn btn-green";
    document.getElementById("buyBtn").className = "btn btn-green";
    document.getElementById("sellBtn").className = "btn btn-blue";
    updateTradeInfo();
}

function showSell() {
    tradeMode = "sell";
    document.getElementById("tradeForm").style.display = "block";
    document.getElementById("tradeSubmitBtn").textContent = "确认卖出";
    document.getElementById("tradeSubmitBtn").className = "btn btn-red";
    document.getElementById("buyBtn").className = "btn btn-blue";
    document.getElementById("sellBtn").className = "btn btn-red";
    updateTradeInfo();
}

function updateTradeInfo() {
    const shares = parseInt(document.getElementById("tradeShares").value) || 0;
    const price = parseFloat(document.getElementById("tradePrice").value) || 0;
    const total = shares * price;
    const commission = total * 0.0003 < 5 ? 5 : total * 0.0003;

    if (tradeMode === "buy") {
        const cost = total + commission;
        document.getElementById("tradeInfo").innerHTML =
            `买入 ${shares} 股 × ${price} = ${total.toFixed(2)}<br>佣金 ${commission.toFixed(2)}（最低5元）<br>合计需支付 <strong style="color:#ffcf82">${cost.toFixed(2)}</strong>`;
    } else {
        const stamp = total * 0.001;
        const net = total - commission - stamp;
        document.getElementById("tradeInfo").innerHTML =
            `卖出 ${shares} 股 × ${price} = ${total.toFixed(2)}<br>佣金 ${commission.toFixed(2)} + 印花税 ${stamp.toFixed(2)}<br>实际到账 <strong style="color:#7ef0ba">${net.toFixed(2)}</strong>`;
    }
}

document.getElementById("tradeShares").addEventListener("input", updateTradeInfo);
document.getElementById("tradePrice").addEventListener("input", updateTradeInfo);

async function doTrade() {
    const shares = parseInt(document.getElementById("tradeShares").value);
    const price = parseFloat(document.getElementById("tradePrice").value);
    const stockCode = document.getElementById("tradeStockCode").textContent;
    const stockName = document.getElementById("tradeStockName").textContent;

    if (!shares || shares < 100 || shares % 100 !== 0) {
        showMsg("买入数量需为100的倍数", "error"); return;
    }
    if (!price || price <= 0) {
        showMsg("请输入有效价格", "error"); return;
    }

    const formData = new FormData();
    formData.append("account_id", currentAccountId);
    formData.append("stock_code", stockCode);
    formData.append("stock_name", stockName);
    formData.append("shares", shares);
    formData.append("price", price);

    const url = tradeMode === "buy" ? "/api/vt/buy" : "/api/vt/sell";
    const res = await fetch(url, { method: "POST", body: formData });
    const data = await res.json();

    if (!data.ok) { showMsg(data.error || "交易失败", "error"); return; }

    showMsg(`${tradeMode === "buy" ? "买入" : "卖出"}成功`, "success");
    document.getElementById("tradeShares").value = "";
    await loadAccountSummary();
    renderUserBar();
}

function setTradeStock(code, name, price) {
    document.getElementById("tradeStockCode").textContent = code;
    document.getElementById("tradeStockName").textContent = name;
    currentTradePrice = price || 0;
    document.getElementById("tradeStockPrice").textContent = price ? price.toFixed(2) + "元" : "获取中...";
    if (price) {
        document.getElementById("tradePrice").value = price.toFixed(2);
    }
    switchTab("trade");
    showBuy();
}

function renderQuickPosTrade(positions) {
    const el = document.getElementById("quickPosTrade");
    if (!positions || positions.length === 0) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="section-title" style="margin-bottom:10px;"><h2 style="font-size:17px;">快捷操作</h2><div class="section-meta">从持仓直接切到加仓/卖出</div></div>` +
        positions.map(p => `
        <div class="position-item" style="margin-bottom:8px;">
            <div class="pos-header">
                <div>
                    <strong>${p.stock_name}</strong>
                    <span class="pos-code">${p.stock_code}</span>
                    <div style="font-size:11px; color:var(--muted); margin-top:4px;">持仓 ${p.shares} 股 @ ${p.avg_cost.toFixed(2)}</div>
                </div>
                <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end;">
                    <button class="btn btn-small btn-green" onclick="quickBuy('${p.stock_code}','${p.stock_name}',${p.current_price})">加仓</button>
                    <button class="btn btn-small btn-red" onclick="quickSell('${p.stock_code}','${p.stock_name}',${p.current_price},${p.shares})">卖出</button>
                </div>
            </div>
        </div>
    `).join("");
}

function quickBuy(code, name, price) { setTradeStock(code, name, price); }

function quickSell(code, name, price, shares) {
    setTradeStock(code, name, price);
    document.getElementById("tradeShares").value = shares;
    showSell();
    updateTradeInfo();
}

function openNewAccountModal() {
    document.getElementById("newAccountModal").classList.add("show");
}
function closeNewAccountModal() {
    document.getElementById("newAccountModal").classList.remove("show");
}
async function doCreateAccount() {
    const name = document.getElementById("newAccountName").value.trim();
    if (!name) { showMsg("请输入账户名称", "error"); return; }
    const formData = new FormData();
    formData.append("account_name", name);
    const res = await fetch("/api/vt/accounts", { method: "POST", body: formData });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "创建失败", "error"); return; }
    closeNewAccountModal();
    const me = await fetch("/api/vt/me");
    const meData = await me.json();
    currentUser = meData;
    accounts = meData.accounts || [];
    currentAccountId = data.account_id;
    renderUserBar();
    await loadAccountSummary();
    showMsg("账户创建成功", "success");
}

async function loadAdminUsers() {
    const res = await fetch("/api/vt/admin/users");
    if (res.status === 403) { showMsg("需要管理员权限", "error"); return; }
    const data = await res.json();
    const el = document.getElementById("adminUsers");
    if (!data.users || data.users.length === 0) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
    el.innerHTML = data.users.map(u => `
        <div class="admin-user">
            <div class="admin-user-header">
                <div>
                    <strong>${u.username}</strong>
                    ${u.is_admin ? '<span style="color:#ffcf82; font-size:12px; margin-left:6px;">[管理员]</span>' : ''}
                </div>
                <div style="font-size:12px; color:var(--muted);">注册: ${new Date(u.created_at).toLocaleString("zh-CN",{hour12:false})}</div>
            </div>
            <div class="admin-account-list">
                ${u.accounts.length === 0 ? '<div style="color:var(--muted); font-size:12px;">无账户</div>' : ''}
                ${u.accounts.map(a => `
                <div class="admin-account-item">
                    <div>
                        <strong>${a.account_name}</strong>
                        <div style="color:#7ef0ba; margin-top:4px;">${fmtMoney(a.balance)}</div>
                    </div>
                    <div style="display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end;">
                        <button class="btn btn-small" onclick="viewAccountDetail(${a.id})">详情</button>
                        <button class="btn btn-small btn-blue" onclick="openAdjustBalance(${a.id}, ${a.balance})">调余额</button>
                        <button class="btn btn-small" style="background:linear-gradient(135deg,#ffcf82,#ff9b71); color:#3a1f00;" onclick="openResetPwd(${u.id}, '${u.username}')">改密码</button>
                        <button class="btn btn-small btn-red" onclick="doDeleteAccount(${a.id}, '${a.account_name}')">销户</button>
                    </div>
                </div>
                `).join("")}
            </div>
        </div>
    `).join("");
}

async function showAdminTab(tab) {
    document.getElementById("adminTabUsers").style.background = tab === "users" ? "linear-gradient(135deg,#254774,#173151)" : "";
    document.getElementById("adminTabAccounts").style.background = tab === "accounts" ? "linear-gradient(135deg,#254774,#173151)" : "#18263d";
    document.getElementById("adminUsers").style.display = tab === "users" ? "block" : "none";
    document.getElementById("adminAccountDetail").style.display = tab === "accounts" ? "block" : "none";
    if (tab === "accounts") loadAdminUsers();
}

async function viewAccountDetail(accountId) {
    const res = await fetch(`/api/vt/admin/account/${accountId}`);
    const data = await res.json();
    if (data.error) { showMsg(data.error, "error"); return; }
    const acc = data.account;
    const posList = data.positions;
    const tradeList = data.trades;

    let html = `
        <div class="card" style="margin-top:14px;">
            <div class="section-title">
                <div><strong>${acc.account_name}</strong><div style="color:#7ef0ba; margin-top:6px;">${fmtMoney(acc.balance)}</div></div>
                <button class="btn btn-small btn-blue" onclick="loadAdminUsers()">返回</button>
            </div>
            <div style="font-size:12px; color:var(--muted);">账户ID: ${acc.id} | 用户ID: ${acc.user_id} | 创建: ${new Date(acc.created_at).toLocaleString("zh-CN",{hour12:false})}</div>
        </div>
        <div style="font-size:13px; font-weight:700; margin:14px 0 8px;">持仓 (${posList.length})</div>`;

    if (posList.length === 0) {
        html += '<div class="empty">暂无持仓</div>';
    } else {
        posList.forEach(p => {
            html += `
        <div class="position-item">
            <div class="pos-header">
                <div><strong>${p.stock_name}</strong> <span class="pos-code">${p.stock_code}</span></div>
                <div>${p.shares}股 @ ${p.avg_cost.toFixed(2)}</div>
            </div>
        </div>`;
        });
    }

    html += `<div style="font-size:13px; font-weight:700; margin:14px 0 8px;">交易记录 (${tradeList.length})</div>`;

    if (tradeList.length === 0) {
        html += '<div class="empty">暂无交易</div>';
    } else {
        tradeList.slice(0, 20).forEach(t => {
            html += `
        <div class="trade-item">
            <div>
                <span class="trade-type ${t.trade_type.toLowerCase()}">${t.trade_type === "BUY" ? "买入" : "卖出"}</span>
                <strong style="display:block; margin-top:8px;">${t.stock_name}</strong>
                <span style="color:var(--muted); font-size:12px;">${t.stock_code}</span>
            </div>
            <div style="text-align:right; font-size:12px; color:var(--muted);">
                <div style="color:var(--text);">${t.shares}股 @ ${t.price.toFixed(2)}</div>
                <div style="margin-top:4px;">${new Date(t.traded_at).toLocaleString("zh-CN",{hour12:false})}</div>
            </div>
        </div>`;
        });
    }

    document.getElementById("adminUsers").style.display = "none";
    document.getElementById("adminAccountDetail").style.display = "block";
    document.getElementById("adminAccountDetail").innerHTML = html;
}

async function doResetAccount(accountId) {
    if (!confirm("确认重置该账户？将清空持仓和交易记录，余额恢复50万。")) return;
    const res = await fetch(`/api/vt/admin/reset/${accountId}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) { showMsg("账户已重置", "success"); loadAdminUsers(); renderUserBar(); }
    else { showMsg(data.error || "失败", "error"); }
}

async function doDeleteAccount(accountId, accountName) {
    if (!confirm(`确认销户「${accountName}」？此操作不可恢复。`)) return;
    const res = await fetch(`/api/vt/admin/delete/${accountId}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) { showMsg("销户成功", "success"); loadAdminUsers(); renderUserBar(); }
    else { showMsg(data.error || "失败", "error"); }
}

function openAdjustBalance(accountId, currentBalance) {
    const newBal = prompt(`调整余额（当前: ${fmtMoney(currentBalance)}）\n输入新余额：`, (currentBalance).toString());
    if (newBal === null) return;
    const val = parseFloat(newBal);
    if (isNaN(val) || val < 0) { showMsg("请输入有效数字", "error"); return; }
    fetch(`/api/vt/admin/balance/${accountId}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `new_balance=${val}`
    }).then(r => r.json()).then(d => {
        if (d.ok) { showMsg("余额已调整", "success"); loadAdminUsers(); renderUserBar(); }
        else { showMsg(d.error || "失败", "error"); }
    });
}

function openResetPwd(userId, username) {
    const newPwd = prompt(`重置用户「${username}」的密码\n输入新密码（至少4字符）：`);
    if (!newPwd) return;
    fetch(`/api/vt/admin/password/${userId}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `new_password=${encodeURIComponent(newPwd)}`
    }).then(r => r.json()).then(d => {
        if (d.ok) { showMsg(`密码已重置为：${newPwd}`, "success"); }
        else { showMsg(d.error || "失败", "error"); }
    });
}

function fmtMoney(v) {
    if (v >= 100000000) return (v/100000000).toFixed(2) + "亿";
    if (v >= 10000) return (v/10000).toFixed(2) + "万";
    return v.toFixed(2) + "元";
}

function showMsg(text, type) {
    const el = document.getElementById("msgBox");
    el.innerHTML = `<div class="${type}-msg">${text}</div>`;
    setTimeout(() => { el.innerHTML = ""; }, 3000);
}

window.setTradeStock = setTradeStock;
</script>
</body>
</html>
