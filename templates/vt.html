<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟炒股</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        
        h1 { text-align: center; color: #e94560; font-size: 22px; margin: 16px 0; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; background: #16213e; border-radius: 10px; padding: 6px; flex-wrap: wrap; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #888; transition: all 0.2s; }
        .tab.active { background: #e94560; color: #fff; font-weight: bold; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
        .card-title { font-size: 14px; color: #888; margin-bottom: 6px; }
        .card-value { font-size: 24px; font-weight: bold; color: #26de81; }
        .card-value.red { color: #ff4d4d; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        
        .btn { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; display: inline-block; text-decoration: none; text-align: center; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-green { background: #26de81; color: #1a1a2e; }
        .btn-blue { background: #0f3460; color: #fff; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #16213e; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; }
        .modal h3 { color: #e94560; margin-bottom: 16px; font-size: 16px; }
        .modal input, .modal select { width: 100%; padding: 10px 12px; background: #0f3460; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
        .modal input:focus, .modal select:focus { border-color: #e94560; }
        .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
        .modal-btns .btn { flex: 1; }
        
        .auth-box { max-width: 360px; margin: 60px auto; }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; background: #16213e; border-radius: 10px; overflow: hidden; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-size: 14px; color: #888; }
        .auth-tab.active { background: #e94560; color: #fff; }
        .auth-form input { width: 100%; padding: 12px 14px; background: #0f3460; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; }
        .auth-form input:focus { border-color: #e94560; }
        .auth-form .btn { width: 100%; margin-top: 8px; }
        
        .account-selector { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
        .account-chip { padding: 8px 16px; background: #0f3460; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; border: 2px solid transparent; }
        .account-chip.active { border-color: #e94560; color: #e94560; }
        .account-chip .balance { color: #26de81; font-size: 11px; margin-left: 4px; }
        .add-account-btn { padding: 8px 14px; background: #16213e; border: 1px dashed #444; border-radius: 20px; font-size: 13px; color: #888; cursor: pointer; white-space: nowrap; }
        
        .position-item { background: #0f3460; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
        .pos-header { display: flex; justify-content: space-between; align-items: center; }
        .pos-name { font-weight: bold; font-size: 15px; }
        .pos-code { color: #888; font-size: 11px; margin-left: 6px; }
        .pos-profit { font-weight: bold; font-size: 15px; }
        .pos-profit.up { color: #ff4d4d; }
        .pos-profit.down { color: #26de81; }
        .pos-detail { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 12px; color: #888; }
        .pos-detail span { text-align: center; }
        .pos-detail .val { color: #fff; font-size: 13px; margin-top: 2px; }
        
        .trade-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #0f3460; font-size: 13px; gap: 10px; }
        .trade-item:last-child { border-bottom: none; }
        .trade-type { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .trade-type.buy { background: #ff4d4d; color: #fff; }
        .trade-type.sell { background: #26de81; color: #1a1a2e; }
        
        .trade-panel { background: #16213e; border-radius: 12px; padding: 16px; }
        .trade-stock { text-align: center; margin-bottom: 16px; }
        .trade-stock-name { font-size: 18px; font-weight: bold; }
        .trade-stock-code { color: #888; font-size: 13px; }
        .trade-stock-price { color: #e94560; font-size: 20px; font-weight: bold; margin-top: 4px; }
        .trade-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
        .trade-inputs input { width: 100%; padding: 12px; background: #0f3460; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; text-align: center; outline: none; }
        .trade-info { background: #0f3460; border-radius: 8px; padding: 12px; font-size: 13px; color: #888; margin-bottom: 14px; line-height: 1.8; }
        
        .admin-user { background: #0f3460; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
        .admin-user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .admin-account-list { font-size: 12px; color: #888; }
        .admin-account-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #16213e; }
        
        .empty { text-align: center; padding: 24px; color: #666; font-size: 13px; }
        .error-msg { background: #ff4d4d; color: #fff; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; }
        .success-msg { background: #26de81; color: #1a1a2e; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; }
        
        a { color: #e94560; text-decoration: none; }
        .user-bar-main { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .user-bar-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .trade-switch { display:flex; gap:8px; margin-bottom:12px; }
        .admin-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
        @media (max-width: 720px) {
            .container { padding: 12px; }
            h1 { font-size: 20px; margin: 12px 0; }
            .card, .trade-panel { padding: 14px; }
            .summary-grid, .trade-inputs { grid-template-columns: 1fr; }
            .tab-bar { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .tab { min-height: 44px; display: flex; align-items: center; justify-content: center; }
            .user-bar-actions { width: 100%; }
            .user-bar-actions .btn { flex: 1 1 calc(50% - 8px); min-width: 0; }
            .account-selector { margin-bottom: 4px; }
            .pos-header, .trade-item, .admin-user-header { align-items: flex-start; flex-wrap: wrap; }
            .pos-detail { grid-template-columns: 1fr 1fr; }
            .trade-switch { display: grid; grid-template-columns: 1fr 1fr; }
            .modal { padding: 18px; }
        }
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .card, .trade-panel { padding: 12px; }
            .summary-grid { gap: 10px; }
            .tab-bar { grid-template-columns: 1fr; }
            .user-bar-actions { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
            .user-bar-actions .btn { width: 100%; }
            .pos-detail { grid-template-columns: 1fr; }
            .trade-switch, .modal-btns, .admin-tabs { grid-template-columns: 1fr; }
            .trade-switch, .admin-tabs { display: grid; }
            .modal-btns { flex-direction: column; }
            .modal-btns .btn { width: 100%; }
            .admin-account-item { align-items: flex-start; flex-wrap: wrap; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 虚拟炒股系统</h1>
        
        <div id="userBar" class="card" style="display:none">
            <div class="user-bar-main">
                <div>
                    <span id="userName" style="font-weight:bold; font-size:15px;"></span>
                    <span id="adminBadge" style="background:#e94560; color:#fff; padding:2px 6px; border-radius:4px; font-size:11px; margin-left:4px; display:none;">管理员</span>
                </div>
                <div class="user-bar-actions">
                    <a href="/" class="btn btn-small" style="background:#0f3460;">📈 股票分析</a>
                    <a href="/screener" class="btn btn-small" style="background:#0f3460;">📈 策略选股</a>
                    <a href="/strategies" class="btn btn-small" style="background:#0f3460;">🧠 策略管理</a>
                    <button class="btn btn-small" style="background:#555;" onclick="logout()">退出</button>
                </div>
            </div>
            <div class="account-selector" id="accountSelector"></div>
        </div>
        
        <div id="msgBox"></div>
        
        <!-- 登录注册 -->
        <div id="authPanel" class="auth-box panel active">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">登录</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">注册</div>
            </div>
            
            <div id="loginForm" class="auth-form">
                <input type="text" id="loginUsername" placeholder="用户名" />
                <input type="password" id="loginPassword" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()" />
                <button class="btn" onclick="doLogin()">登录</button>
                <div style="margin-top:12px; text-align:center; font-size:12px; color:#666;">
                    <div>管理员: admin / admin</div>
                </div>
            </div>
            
            <div id="registerForm" class="auth-form" style="display:none">
                <input type="text" id="regUsername" placeholder="设置用户名 (2-20字符)" />
                <input type="password" id="regPassword" placeholder="设置密码 (至少4字符)" />
                <button class="btn btn-green" onclick="doRegister()">注册并登录</button>
            </div>
        </div>
        
        <!-- 主面板 -->
        <div id="mainPanel" class="panel">
            <div class="summary-grid" id="summaryGrid">
                <div class="card"><div class="card-title">总资产</div><div class="card-value" id="totalAssets">-</div></div>
                <div class="card"><div class="card-title">持仓市值</div><div class="card-value" id="marketValue">-</div></div>
                <div class="card"><div class="card-title">现金余额</div><div class="card-value" id="cashBalance" style="color:#fff">-</div></div>
                <div class="card"><div class="card-title">累计盈亏</div><div class="card-value" id="totalProfit">-</div></div>
            </div>
            
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('positions')">📊 持仓</div>
                <div class="tab" onclick="switchTab('trades')">📋 交易</div>
                <div class="tab" onclick="switchTab('trade')">💰 买入/卖出</div>
                <div class="tab" id="adminTab" style="display:none" onclick="switchTab('admin')">⚙️ 管理</div>
            </div>
            
            <div id="positionsPanel" class="panel active">
                <div id="positionsList"><div class="empty">加载中...</div></div>
            </div>
            
            <div id="tradesPanel" class="panel">
                <div id="tradesList"><div class="empty">加载中...</div></div>
            </div>
            
            <div id="tradePanel" class="panel">
                <div class="trade-panel">
                    <div class="trade-stock">
                        <div class="trade-stock-name" id="tradeStockName">-</div>
                        <div class="trade-stock-code" id="tradeStockCode">-</div>
                        <div class="trade-stock-price" id="tradeStockPrice">-</div>
                    </div>
                    <div class="trade-switch">
                        <button class="btn btn-green" id="buyBtn" onclick="showBuy()" style="flex:1;">买入</button>
                        <button class="btn" id="sellBtn" onclick="showSell()" style="flex:1; background:#0f3460;">卖出</button>
                    </div>
                    <div id="tradeForm" style="display:none;">
                        <div class="trade-inputs">
                            <input type="number" id="tradeShares" placeholder="买入股数 (100的倍数)" min="100" step="100" />
                            <input type="number" id="tradePrice" placeholder="价格" step="0.01" />
                        </div>
                        <div class="trade-info" id="tradeInfo">输入股数和价格</div>
                        <button class="btn" id="tradeSubmitBtn" onclick="doTrade()" style="width:100%;">确认交易</button>
                    </div>
                </div>
                <div id="quickPosTrade" style="margin-top:14px;"></div>
            </div>
            
            <div id="adminPanel" class="panel">
                <div class="admin-tabs">
                    <button class="btn btn-small" style="background:#0f3460;" onclick="showAdminTab('users')" id="adminTabUsers">👥 用户列表</button>
                    <button class="btn btn-small" onclick="showAdminTab('accounts')" id="adminTabAccounts">💼 账户管理</button>
                </div>
                <div id="adminUsers"><div class="empty">加载中...</div></div>
                <div id="adminAccountDetail" style="display:none;"></div>
            </div>
        </div>
    </div>
    
    <!-- 新建账户弹窗 -->
    <div class="modal-overlay" id="newAccountModal">
        <div class="modal">
            <h3>新建虚拟账户</h3>
            <input type="text" id="newAccountName" placeholder="账户名称，如：账户B" />
            <div style="font-size:12px; color:#888; margin-bottom:12px;">每个账户初始资金 50万元</div>
            <div class="modal-btns">
                <button class="btn btn-blue" onclick="closeNewAccountModal()">取消</button>
                <button class="btn" onclick="doCreateAccount()">创建</button>
            </div>
        </div>
    </div>

<script>
const COOKIE = "vt_session";
let currentUser = null;
let accounts = [];
let currentAccountId = null;
let tradeMode = "buy";
let currentTradePrice = 0;

document.addEventListener("DOMContentLoaded", async () => {
    await checkSession();
});

function switchAuthTab(tab) {
    document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
    });
    document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
    document.getElementById("registerForm").style.display = tab === "register" ? "block" : "none";
}

async function doLogin() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!username || !password) { showMsg("请输入用户名和密码", "error"); return; }
    const res = await fetch("/api/vt/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "登录失败", "error"); return; }
    document.cookie = `${COOKIE}=${data.token}; path=/; max-age=2592000`;
    await loadUserData();
}

async function doRegister() {
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    if (!username || !password) { showMsg("请输入用户名和密码", "error"); return; }
    const res = await fetch("/api/vt/register", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "注册失败", "error"); return; }
    await doLogin();
}

async function logout() {
    await fetch("/api/vt/logout", { method: "POST" });
    document.cookie = `${COOKIE}=; path=/; max-age=0`;
    location.reload();
}

async function checkSession() {
    const res = await fetch("/api/vt/me");
    const data = await res.json();
    // 尝试读取预填股票
    const stored = sessionStorage.getItem('vt_stock');
    let preStock = null;
    if (stored) { try { preStock = JSON.parse(stored); } catch(e) {} }
    
    if (data.logged_in) {
        currentUser = data;
        accounts = data.accounts || [];
        if (accounts.length > 0) currentAccountId = accounts[0].id;
        renderUserBar();
        renderMainPanel();
        loadAccountSummary();
        if (preStock) {
            sessionStorage.removeItem('vt_stock');
            setTradeStock(preStock.code, preStock.name, preStock.price);
        }
    } else {
        renderAuthPanel();
        if (preStock) {
            sessionStorage.removeItem('vt_stock');
            // 未登录时也预填股票（会提示先登录）
            setTradeStock(preStock.code, preStock.name, preStock.price);
        }
    }
}

function renderAuthPanel() {
    document.getElementById("authPanel").classList.add("active");
    document.getElementById("mainPanel").classList.remove("active");
    document.getElementById("userBar").style.display = "none";
}

function renderUserBar() {
    document.getElementById("userBar").style.display = "block";
    document.getElementById("userName").textContent = currentUser.username;
    document.getElementById("adminBadge").style.display = currentUser.is_admin ? "inline" : "none";
    document.getElementById("adminTab").style.display = currentUser.is_admin ? "block" : "none";
    
    const sel = document.getElementById("accountSelector");
    sel.innerHTML = accounts.map(a => `
        <div class="account-chip ${a.id == currentAccountId ? "active" : ""}" onclick="selectAccount(${a.id})">
            ${a.account_name} <span class="balance">${(a.balance/10000).toFixed(1)}万</span>
        </div>
    `).join("");
    sel.innerHTML += `<div class="add-account-btn" onclick="openNewAccountModal()">+ 新账户</div>`;
}

async function selectAccount(id) {
    currentAccountId = id;
    document.querySelectorAll(".account-chip").forEach(c => c.classList.remove("active"));
    event.target.closest(".account-chip").classList.add("active");
    await loadAccountSummary();
}

function renderMainPanel() {
    document.getElementById("authPanel").classList.remove("active");
    document.getElementById("mainPanel").classList.add("active");
}

async function loadAccountSummary() {
    if (!currentAccountId) return;
    const res = await fetch(`/api/vt/account/${currentAccountId}`);
    const data = await res.json();
    if (data.error) { showMsg(data.error, "error"); return; }
    
    document.getElementById("totalAssets").textContent = fmtMoney(data.total_assets);
    document.getElementById("marketValue").textContent = fmtMoney(data.market_value);
    document.getElementById("cashBalance").textContent = fmtMoney(data.balance);
    
    const profit = data.total_profit;
    const pct = data.total_profit_pct;
    const profitEl = document.getElementById("totalProfit");
    profitEl.textContent = fmtMoney(profit) + " (" + (profit >= 0 ? "+" : "") + pct + "%)";
    profitEl.className = "card-value " + (profit >= 0 ? "red" : "");
    
    renderPositions(data.positions);
    await loadTrades();
    renderQuickPosTrade(data.positions);
}

async function loadTrades() {
    const res = await fetch(`/api/vt/account/${currentAccountId}/trades`);
    const data = await res.json();
    renderTrades(data.trades || []);
}

function renderPositions(positions) {
    const el = document.getElementById("positionsList");
    if (!positions || positions.length === 0) {
        el.innerHTML = '<div class="empty">暂无持仓，去买入股票吧！</div>';
        return;
    }
    el.innerHTML = positions.map(p => `
        <div class="position-item">
            <div class="pos-header">
                <div>
                    <span class="pos-name">${p.stock_name}</span>
                    <span class="pos-code">${p.stock_code}</span>
                </div>
                <div class="pos-profit ${p.profit >= 0 ? "up" : "down"}">
                    ${p.profit >= 0 ? "+" : ""}${fmtMoney(p.profit)} (${p.profit_pct}%)
                </div>
            </div>
            <div class="pos-detail">
                <span>持仓<div class="val">${p.shares}股</div></span>
                <span>成本价<div class="val">${p.avg_cost.toFixed(2)}</div></span>
                <span>现价<div class="val">${p.current_price.toFixed(2)}</div></span>
            </div>
        </div>
    `).join("");
}

function renderTrades(trades) {
    const el = document.getElementById("tradesList");
    if (!trades || trades.length === 0) {
        el.innerHTML = '<div class="empty">暂无交易记录</div>';
        return;
    }
    el.innerHTML = trades.map(t => {
        const date = new Date(t.traded_at).toLocaleString("zh-CN", {hour12:false});
        return `
        <div class="trade-item">
            <div>
                <span class="trade-type ${t.trade_type.toLowerCase()}">${t.trade_type === "BUY" ? "买入" : "卖出"}</span>
                <strong style="margin-left:8px;">${t.stock_name}</strong>
                <span style="color:#888; font-size:12px; margin-left:4px;">${t.stock_code}</span>
            </div>
            <div style="text-align:right; font-size:12px;">
                <div>${t.shares}股 @ ${t.price.toFixed(2)}</div>
                <div style="color:#888;">${date}</div>
            </div>
        </div>
        `;
    }).join("");
}

function switchTab(tab) {
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".panel");
    tabs.forEach((t, i) => {
        const tabNames = ["positions", "trades", "trade", "admin"];
        t.classList.toggle("active", tabNames[i] === tab);
    });
    const panelNames = ["positionsPanel", "tradesPanel", "tradePanel", "adminPanel"];
    panels.forEach(p => {
        const name = p.id.replace("Panel", "");
        p.classList.toggle("active", panelNames.indexOf(p.id) >= 0 && name === tab);
    });
    
    if (tab === "admin" && currentUser && currentUser.is_admin) loadAdminUsers();
}

function showBuy() {
    tradeMode = "buy";
    document.getElementById("tradeForm").style.display = "block";
    document.getElementById("tradeSubmitBtn").textContent = "确认买入";
    document.getElementById("tradeSubmitBtn").className = "btn btn-green";
    document.getElementById("buyBtn").className = "btn btn-green";
    document.getElementById("sellBtn").className = "btn";
    updateTradeInfo();
}

function showSell() {
    tradeMode = "sell";
    document.getElementById("tradeForm").style.display = "block";
    document.getElementById("tradeSubmitBtn").textContent = "确认卖出";
    document.getElementById("tradeSubmitBtn").className = "btn";
    document.getElementById("buyBtn").className = "btn btn-blue";
    document.getElementById("sellBtn").className = "btn btn-red";
    updateTradeInfo();
}

function updateTradeInfo() {
    const shares = parseInt(document.getElementById("tradeShares").value) || 0;
    const price = parseFloat(document.getElementById("tradePrice").value) || 0;
    const total = shares * price;
    const commission = total * 0.0003 < 5 ? 5 : total * 0.0003;
    
    if (tradeMode === "buy") {
        const cost = total + commission;
        document.getElementById("tradeInfo").innerHTML = 
            `买入 ${shares} 股 × ${price} = ${total.toFixed(2)}<br>佣金 ${commission.toFixed(2)}（最低5元）<br>合计需支付 <strong style="color:#e94560">${cost.toFixed(2)}</strong>`;
    } else {
        const stamp = total * 0.001;
        const net = total - commission - stamp;
        document.getElementById("tradeInfo").innerHTML = 
            `卖出 ${shares} 股 × ${price} = ${total.toFixed(2)}<br>佣金 ${commission.toFixed(2)} + 印花税 ${stamp.toFixed(2)}<br>实际到账 <strong style="color:#26de81">${net.toFixed(2)}</strong>`;
    }
}

document.getElementById("tradeShares").addEventListener("input", updateTradeInfo);
document.getElementById("tradePrice").addEventListener("input", updateTradeInfo);

async function doTrade() {
    const shares = parseInt(document.getElementById("tradeShares").value);
    const price = parseFloat(document.getElementById("tradePrice").value);
    const stockCode = document.getElementById("tradeStockCode").textContent;
    const stockName = document.getElementById("tradeStockName").textContent;
    
    if (!shares || shares < 100 || shares % 100 !== 0) {
        showMsg("买入数量需为100的倍数", "error"); return;
    }
    if (!price || price <= 0) {
        showMsg("请输入有效价格", "error"); return;
    }
    
    const formData = new FormData();
    formData.append("account_id", currentAccountId);
    formData.append("stock_code", stockCode);
    formData.append("stock_name", stockName);
    formData.append("shares", shares);
    formData.append("price", price);
    
    const url = tradeMode === "buy" ? "/api/vt/buy" : "/api/vt/sell";
    const res = await fetch(url, { method: "POST", body: formData });
    const data = await res.json();
    
    if (!data.ok) { showMsg(data.error || "交易失败", "error"); return; }
    
    showMsg(`${tradeMode === "buy" ? "买入" : "卖出"}成功！`, "success");
    document.getElementById("tradeShares").value = "";
    await loadAccountSummary();
    renderUserBar();
}

// 设置交易股票（由选股页调用）
function setTradeStock(code, name, price) {
    document.getElementById("tradeStockCode").textContent = code;
    document.getElementById("tradeStockName").textContent = name;
    currentTradePrice = price || 0;
    document.getElementById("tradeStockPrice").textContent = price ? price.toFixed(2) + "元" : "获取中...";
    if (price) {
        document.getElementById("tradePrice").value = price.toFixed(2);
    }
    switchTab("trade");
    showBuy();
}

function renderQuickPosTrade(positions) {
    const el = document.getElementById("quickPosTrade");
    if (!positions || positions.length === 0) { el.innerHTML = ""; return; }
    el.innerHTML = `<div style="font-size:12px; color:#888; margin-bottom:8px;">快捷操作</div>` +
        positions.map(p => `
        <div style="display:flex; justify-content:space-between; align-items:center; background:#0f3460; border-radius:8px; padding:10px 14px; margin-bottom:6px;">
            <div>
                <strong>${p.stock_name}</strong>
                <span style="color:#888; font-size:12px; margin-left:6px;">${p.stock_code}</span>
                <div style="font-size:11px; color:#888; margin-top:2px;">持仓 ${p.shares} 股 @ ${p.avg_cost.toFixed(2)}</div>
            </div>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-small btn-green" onclick="quickBuy('${p.stock_code}','${p.stock_name}',${p.current_price})">加仓</button>
                <button class="btn btn-small" onclick="quickSell('${p.stock_code}','${p.stock_name}',${p.current_price},${p.shares})">卖出</button>
            </div>
        </div>
    `).join("");
}

function quickBuy(code, name, price) { setTradeStock(code, name, price); }

function quickSell(code, name, price, shares) {
    setTradeStock(code, name, price);
    document.getElementById("tradeShares").value = shares;
    showSell();
    updateTradeInfo();
}

function openNewAccountModal() {
    document.getElementById("newAccountModal").classList.add("show");
}
function closeNewAccountModal() {
    document.getElementById("newAccountModal").classList.remove("show");
}
async function doCreateAccount() {
    const name = document.getElementById("newAccountName").value.trim();
    if (!name) { showMsg("请输入账户名称", "error"); return; }
    const formData = new FormData();
    formData.append("account_name", name);
    const res = await fetch("/api/vt/accounts", { method: "POST", body: formData });
    const data = await res.json();
    if (!data.ok) { showMsg(data.error || "创建失败", "error"); return; }
    closeNewAccountModal();
    const me = await fetch("/api/vt/me");
    const meData = await me.json();
    currentUser = meData;
    accounts = meData.accounts || [];
    currentAccountId = data.account_id;
    renderUserBar();
    await loadAccountSummary();
    showMsg("账户创建成功！", "success");
}

async function loadAdminUsers() {
    const res = await fetch("/api/vt/admin/users");
    if (res.status === 403) { showMsg("需要管理员权限", "error"); return; }
    const data = await res.json();
    const el = document.getElementById("adminUsers");
    if (!data.users || data.users.length === 0) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
    el.innerHTML = data.users.map(u => `
        <div class="admin-user">
            <div class="admin-user-header">
                <div><strong>${u.username}</strong> ${u.is_admin ? '<span style="color:#e94560; font-size:12px;">[管理员]</span>' : ''}</div>
                <div style="font-size:12px; color:#888;">注册: ${new Date(u.created_at).toLocaleString("zh-CN",{hour12:false})}</div>
            </div>
            <div class="admin-account-list">
                ${u.accounts.length === 0 ? '<div style="color:#666; font-size:12px;">无账户</div>' : ''}
                ${u.accounts.map(a => `
                <div class="admin-account-item">
                    <div>
                        <strong>${a.account_name}</strong>
                        <span style="color:#26de81; margin-left:8px;">${fmtMoney(a.balance)}</span>
                    </div>
                    <div style="display:flex; gap:4px; flex-wrap:wrap;">
                        <button class="btn btn-small" onclick="viewAccountDetail(${a.id})">📋 详情</button>
                        <button class="btn btn-small" style="background:#0f3460;" onclick="openAdjustBalance(${a.id}, ${a.balance})">💰 调余额</button>
                        <button class="btn btn-small" style="background:#e94560;" onclick="openResetPwd(${u.id}, '${u.username}')">🔑 改密码</button>
                        <button class="btn btn-small" style="background:#ff4d4d;" onclick="doDeleteAccount(${a.id}, '${a.account_name}')">🗑️ 销户</button>
                    </div>
                </div>
                `).join("")}
            </div>
        </div>
    `).join("");
}

async function showAdminTab(tab) {
    document.getElementById("adminTabUsers").style.background = tab === "users" ? "#0f3460" : "";
    document.getElementById("adminTabAccounts").style.background = tab === "accounts" ? "#0f3460" : "";
    document.getElementById("adminUsers").style.display = tab === "users" ? "block" : "none";
    document.getElementById("adminAccountDetail").style.display = tab === "accounts" ? "block" : "none";
    if (tab === "accounts") loadAdminUsers();
}

async function viewAccountDetail(accountId) {
    const res = await fetch(`/api/vt/admin/account/${accountId}`);
    const data = await res.json();
    if (data.error) { showMsg(data.error, "error"); return; }
    const acc = data.account;
    const posList = data.positions;
    const tradeList = data.trades;
    
    let html = `
        <div class="card" style="margin-top:14px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div><strong>${acc.account_name}</strong> <span style="color:#26de81;">${fmtMoney(acc.balance)}</span></div>
                <button class="btn btn-small" onclick="loadAdminUsers()">← 返回</button>
            </div>
            <div style="font-size:12px; color:#888;">账户ID: ${acc.id} | 用户ID: ${acc.user_id} | 创建: ${new Date(acc.created_at).toLocaleString("zh-CN",{hour12:false})}</div>
        </div>
        <div style="font-size:13px; font-weight:bold; margin:14px 0 8px;">📊 持仓 (${posList.length})</div>`;
    
    if (posList.length === 0) {
        html += '<div class="empty">暂无持仓</div>';
    } else {
        posList.forEach(p => {
            html += `
        <div class="position-item">
            <div style="display:flex; justify-content:space-between;">
                <div><strong>${p.stock_name}</strong> <span style="color:#888; font-size:12px;">${p.stock_code}</span></div>
                <div>${p.shares}股 @ ${p.avg_cost.toFixed(2)}</div>
            </div>
        </div>`;
        });
    }
    
    html += `<div style="font-size:13px; font-weight:bold; margin:14px 0 8px;">📋 交易记录 (${tradeList.length})</div>`;
    
    if (tradeList.length === 0) {
        html += '<div class="empty">暂无交易</div>';
    } else {
        tradeList.slice(0, 20).forEach(t => {
            html += `
        <div class="trade-item">
            <div>
                <span class="trade-type ${t.trade_type.toLowerCase()}">${t.trade_type === "BUY" ? "买入" : "卖出"}</span>
                <strong style="margin-left:8px;">${t.stock_name}</strong>
                <span style="color:#888; font-size:12px;">${t.stock_code}</span>
            </div>
            <div style="text-align:right; font-size:12px;">
                <div>${t.shares}股 @ ${t.price.toFixed(2)}</div>
                <div style="color:#888;">${new Date(t.traded_at).toLocaleString("zh-CN",{hour12:false})}</div>
            </div>
        </div>`;
        });
    }
    
    document.getElementById("adminUsers").style.display = "none";
    document.getElementById("adminAccountDetail").style.display = "block";
    document.getElementById("adminAccountDetail").innerHTML = html;
}

async function doResetAccount(accountId) {
    if (!confirm("确认重置该账户？将清空持仓和交易记录，余额恢复50万！")) return;
    const res = await fetch(`/api/vt/admin/reset/${accountId}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) { showMsg("账户已重置", "success"); loadAdminUsers(); renderUserBar(); }
    else { showMsg(data.error || "失败", "error"); }
}

async function doDeleteAccount(accountId, accountName) {
    if (!confirm(`确认销户「${accountName}」？此操作不可恢复！`)) return;
    const res = await fetch(`/api/vt/admin/delete/${accountId}`, { method: "POST" });
    const data = await res.json();
    if (data.ok) { showMsg("销户成功", "success"); loadAdminUsers(); renderUserBar(); }
    else { showMsg(data.error || "失败", "error"); }
}

function openAdjustBalance(accountId, currentBalance) {
    const newBal = prompt(`调整余额（当前: ${fmtMoney(currentBalance)}）：\n输入新余额（数字）：`, (currentBalance).toString());
    if (newBal === null) return;
    const val = parseFloat(newBal);
    if (isNaN(val) || val < 0) { showMsg("请输入有效数字", "error"); return; }
    fetch(`/api/vt/admin/balance/${accountId}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `new_balance=${val}`
    }).then(r => r.json()).then(d => {
        if (d.ok) { showMsg("余额已调整", "success"); loadAdminUsers(); renderUserBar(); }
        else { showMsg(d.error || "失败", "error"); }
    });
}

function openResetPwd(userId, username) {
    const newPwd = prompt(`重置用户「${username}」的密码：\n输入新密码（至少4字符）：`);
    if (!newPwd) return;
    fetch(`/api/vt/admin/password/${userId}`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `new_password=${encodeURIComponent(newPwd)}`
    }).then(r => r.json()).then(d => {
        if (d.ok) { showMsg(`密码已重置为：${newPwd}`, "success"); }
        else { showMsg(d.error || "失败", "error"); }
    });
}

function fmtMoney(v) {
    if (v >= 100000000) return (v/100000000).toFixed(2) + "亿";
    if (v >= 10000) return (v/10000).toFixed(2) + "万";
    return v.toFixed(2) + "元";
}

function showMsg(text, type) {
    const el = document.getElementById("msgBox");
    el.innerHTML = `<div class="${type}-msg">${text}</div>`;
    setTimeout(() => { el.innerHTML = ""; }, 3000);
}

// 暴露给外部调用（选股页一键买入）
window.setTradeStock = setTradeStock;
</script>
