<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>策略管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0b1220; color: #edf3ff; min-height: 100vh; }
        .page { padding: 14px 14px 92px; max-width: 720px; margin: 0 auto; }
        .hero { margin-bottom: 14px; }
        h1 { font-size: 24px; color: #ffd166; margin-bottom: 8px; }
        .desc { color: #90a6c8; font-size: 13px; line-height: 1.7; }
        .panel { background: linear-gradient(180deg, #142036, #0f1726); border: 1px solid #23324a; border-radius: 18px; padding: 14px; margin-bottom: 14px; }
        .panel-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .panel-title h2 { font-size: 17px; }
        .hint { color: #7f94b3; font-size: 12px; }
        .list { display: grid; gap: 10px; }
        .item { background: #0b1321; border: 1px solid #223049; border-radius: 14px; padding: 12px; }
        .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .name { font-size: 16px; font-weight: 700; }
        .small { color: #8ba0c0; font-size: 12px; line-height: 1.6; }
        .muted { color: #90a6c8; font-size: 13px; line-height: 1.6; }
        .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #20304a; color: #9ed4ff; font-size: 12px; margin-right: 6px; margin-top: 8px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { border: none; border-radius: 12px; padding: 11px 14px; font-size: 14px; min-height: 44px; cursor: pointer; width: 100%; }
        .btn:disabled { opacity: 0.7; cursor: wait; }
        .btn.primary { background: #ffd166; color: #271800; }
        .btn.secondary { background: #23324a; color: #dbe6f9; }
        .btn.green { background: #33c481; color: #081910; }
        .btn.danger { background: #ef476f; color: #fff; }
        .fab-bar { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); background: rgba(8, 14, 24, 0.92); backdrop-filter: blur(10px); border-top: 1px solid #23324a; }
        .fab-row { max-width: 720px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .overlay { position: fixed; inset: 0; background: rgba(4, 10, 18, 0.72); backdrop-filter: blur(8px); z-index: 40; display: none; }
        .overlay.show { display: block; }
        .sheet { position: fixed; inset: 10px; z-index: 50; background: linear-gradient(180deg, #162135, #0f1726); border: 1px solid #24324a; border-radius: 20px; padding: 14px; display: none; overflow: auto; }
        .sheet.show { display: block; }
        .sheet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; position: sticky; top: 0; background: linear-gradient(180deg, #162135, #0f1726); padding-bottom: 8px; }
        .sheet-head h3 { font-size: 18px; }
        input, textarea, select { width: 100%; background: #0a1220; color: #edf3ff; border: 1px solid #2c3b55; border-radius: 12px; padding: 11px 12px; font-size: 16px; margin-bottom: 10px; }
        textarea { min-height: 120px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .checkbox-list { display: grid; gap: 8px; margin-bottom: 12px; }
        .checkbox-item { display: flex; gap: 8px; align-items: flex-start; background: #0b1321; padding: 10px; border-radius: 10px; }
        .checkbox-item input { width: auto; margin: 2px 0 0; }
        .generate-status { display: none; align-items: center; gap: 10px; margin: 4px 0 12px; padding: 10px 12px; border-radius: 12px; background: rgba(11, 19, 33, 0.92); border: 1px solid #294260; color: #b8d8ff; font-size: 13px; line-height: 1.6; }
        .generate-status.show { display: flex; }
        .spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(184, 216, 255, 0.22); border-top-color: #9ed4ff; animation: spin 0.9s linear infinite; flex: 0 0 auto; }
        .sheet-loading-mask { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(6, 12, 21, 0.74); backdrop-filter: blur(6px); border-radius: inherit; z-index: 5; }
        .sheet-loading-mask.show { display: flex; }
        .sheet-loading-card { min-width: min(100%, 300px); display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 16px; background: rgba(13, 21, 35, 0.96); border: 1px solid #314a69; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28); color: #dbeafe; }
        .sheet-loading-card .spinner { width: 20px; height: 20px; border-width: 3px; }
        .sheet-loading-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .sheet-loading-desc { color: #9fb7db; font-size: 12px; line-height: 1.6; }
        .nav-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
        .nav-link { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; border-radius: 12px; background: #172338; color: #dbe6f9; text-decoration: none; font-size: 13px; }
        .section-meta { margin-bottom: 12px; }
        .pagination { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .pagination-info { color: #90a6c8; font-size: 12px; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 420px) {
            .page { padding: 12px 12px 88px; }
            .sheet { inset: 8px; padding: 12px; }
            .btn-row, .fab-row, .nav-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>策略管理</h1>
            <div class="desc">手机端单独使用移动版布局，列表浏览和编辑配置拆开处理，避免长表单挤占主内容区。</div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <h2>策略列表</h2>
                <span class="hint">点击编辑进入全屏配置</span>
            </div>
            <div id="strategySummary" class="section-meta muted">加载中...</div>
            <div id="strategyList" class="list"><div class="muted">加载中...</div></div>
            <div id="strategyPagination" class="pagination" style="display:none;"></div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <h2>策略组</h2>
                <span class="hint">支持 AND / OR</span>
            </div>
            <div id="groupSummary" class="section-meta muted">加载中...</div>
            <div id="groupList" class="list"><div class="muted">加载中...</div></div>
            <div id="groupPagination" class="pagination" style="display:none;"></div>
        </div>

        <div class="nav-row">
            <a class="nav-link" href="/screener">运行选股</a>
            <a class="nav-link" href="/">股票分析</a>
            <a class="nav-link" href="/vt">虚拟炒股</a>
        </div>
    </div>

    <div class="overlay" id="mobileOverlay" onclick="closeAllSheets()"></div>

    <div class="sheet" id="strategyEditorCard">
        <div id="sheetLoadingMask" class="sheet-loading-mask" aria-hidden="true">
            <div class="sheet-loading-card" role="status" aria-live="polite">
                <span class="spinner" aria-hidden="true"></span>
                <div>
                    <div class="sheet-loading-title">策略代码生成中</div>
                    <div class="sheet-loading-desc" id="sheetLoadingText">LLM 正在处理你的描述，请稍候...</div>
                </div>
            </div>
        </div>
        <div class="sheet-head">
            <h3>策略配置</h3>
            <button class="btn secondary" type="button" style="width:auto; min-width:88px;" onclick="closeSheet('strategyEditorCard')">关闭</button>
        </div>
        <input type="hidden" id="strategyId" />
        <input id="strategyName" placeholder="策略名称" />
        <input id="strategyDesc" placeholder="策略描述" />
        <select id="strategyMode" onchange="switchStrategyMode()">
            <option value="direct">直接写代码</option>
            <option value="ai">文字生成代码</option>
        </select>
        <div id="aiPromptWrap" style="display:none;">
            <textarea id="strategyPrompt" placeholder="例如：找出最近20日站上 MA20，且日线 MACD 金叉，同时周线未出现 4 连阳的股票"></textarea>
            <div class="btn-row" style="margin-bottom:10px;">
                <button class="btn green" id="generateCodeBtn" type="button" onclick="generateCode()">生成代码</button>
                <button class="btn secondary" id="copyPromptBtn" type="button" onclick="copyLlmContext()">复制 LLM 上下文</button>
            </div>
            <div id="generateStatus" class="generate-status" aria-live="polite">
                <span class="spinner" aria-hidden="true"></span>
                <span id="generateStatusText">正在调用 LLM 生成策略代码，通常需要几秒到几十秒，请稍候... 已等待 0 秒</span>
            </div>
        </div>
        <textarea id="strategyCode" style="min-height:260px;" placeholder="策略代码必须定义 run_strategy(context)"></textarea>
        <label class="small" style="display:flex; gap:8px; align-items:center; margin-bottom:12px;">
            <input type="checkbox" id="strategyEnabled" checked style="width:auto; margin:0;" />
            启用该策略
        </label>
        <div class="btn-row">
            <button class="btn primary" type="button" onclick="saveStrategy()">保存策略</button>
            <button class="btn secondary" type="button" onclick="resetStrategyForm()">清空</button>
        </div>
    </div>

    <div class="sheet" id="groupEditorCard">
        <div class="sheet-head">
            <h3>策略组配置</h3>
            <button class="btn secondary" type="button" style="width:auto; min-width:88px;" onclick="closeSheet('groupEditorCard')">关闭</button>
        </div>
        <input type="hidden" id="groupId" />
        <input id="groupName" placeholder="策略组名称" />
        <input id="groupDesc" placeholder="策略组描述" />
        <select id="groupMode">
            <option value="AND">全部满足</option>
            <option value="OR">满足任一策略</option>
        </select>
        <div class="hint" style="margin-bottom:10px;">勾选要包含在策略组内的策略</div>
        <div id="groupStrategyList" class="checkbox-list"></div>
        <div class="btn-row">
            <button class="btn primary" type="button" onclick="saveGroup()">保存策略组</button>
            <button class="btn secondary" type="button" onclick="resetGroupForm()">清空</button>
        </div>
    </div>

    <div class="fab-bar">
        <div class="fab-row">
            <button class="btn primary" type="button" onclick="openStrategyEditor(true)">新建策略</button>
            <button class="btn secondary" type="button" onclick="openGroupEditor(true)">新建策略组</button>
        </div>
    </div>

    <script>
        let strategyData = [];
        let groupData = [];
        const STRATEGY_PAGE_SIZE = 5;
        const GROUP_PAGE_SIZE = 5;
        let strategyPage = 1;
        let groupPage = 1;

        function getPaginationData(items, currentPage, pageSize) {
            const total = items.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            const safePage = Math.min(Math.max(currentPage, 1), totalPages);
            const start = total === 0 ? 0 : (safePage - 1) * pageSize;
            const end = Math.min(start + pageSize, total);
            return {
                total,
                totalPages,
                currentPage: safePage,
                pageItems: items.slice(start, end),
                start,
                end,
            };
        }

        function renderPagination(containerId, pagination, onPageChange) {
            const el = document.getElementById(containerId);
            if (pagination.total <= 0) {
                el.style.display = 'none';
                el.innerHTML = '';
                return;
            }
            el.style.display = 'flex';
            el.innerHTML = `
                <div class="pagination-info">第 ${pagination.currentPage} / ${pagination.totalPages} 页，共 ${pagination.total} 条</div>
                <div class="btn-row" style="margin-top:0;">
                    <button class="btn secondary" type="button" ${pagination.currentPage <= 1 ? 'disabled' : ''} onclick="${onPageChange}(${pagination.currentPage - 1})">上一页</button>
                    <button class="btn secondary" type="button" ${pagination.currentPage >= pagination.totalPages ? 'disabled' : ''} onclick="${onPageChange}(${pagination.currentPage + 1})">下一页</button>
                </div>
            `;
        }

        function toggleOverlay(show) {
            document.getElementById('mobileOverlay').classList.toggle('show', !!show);
            document.body.style.overflow = show ? 'hidden' : '';
        }

        function openSheet(sheetId) {
            closeAllSheets();
            document.getElementById(sheetId).classList.add('show');
            toggleOverlay(true);
        }

        function closeSheet(sheetId) {
            document.getElementById(sheetId).classList.remove('show');
            if (!document.querySelector('.sheet.show')) {
                toggleOverlay(false);
            }
        }

        function closeAllSheets() {
            document.getElementById('strategyEditorCard').classList.remove('show');
            document.getElementById('groupEditorCard').classList.remove('show');
            toggleOverlay(false);
        }

        function openStrategyEditor(isNew = false) {
            if (isNew) {
                resetStrategyForm();
            }
            openSheet('strategyEditorCard');
        }

        function openGroupEditor(isNew = false) {
            if (isNew) {
                resetGroupForm();
            }
            openSheet('groupEditorCard');
        }

        function switchStrategyMode() {
            document.getElementById('aiPromptWrap').style.display = document.getElementById('strategyMode').value === 'ai' ? 'block' : 'none';
        }

        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]));
        }

        function renderStrategies() {
            const el = document.getElementById('strategyList');
            const pagination = getPaginationData(strategyData, strategyPage, STRATEGY_PAGE_SIZE);
            strategyPage = pagination.currentPage;
            document.getElementById('strategySummary').textContent = pagination.total
                ? `当前展示 ${pagination.start + 1}-${pagination.end} 条，共 ${pagination.total} 条`
                : '暂无策略';
            if (!pagination.total) {
                el.innerHTML = '<div class="muted">暂无策略</div>';
                renderPagination('strategyPagination', pagination, 'changeStrategyPage');
                return;
            }
            el.innerHTML = pagination.pageItems.map(item => `
                <div class="item">
                    <div class="row">
                        <div>
                            <div class="name">${item.name}</div>
                            <div class="small">${item.description || '无描述'}</div>
                        </div>
                        <div class="small">${item.enabled ? '启用中' : '已停用'} | ${item.create_mode || 'direct'}</div>
                    </div>
                    <div>${item.enabled ? '<span class="pill">可执行</span>' : '<span class="pill">停用</span>'}</div>
                    <div class="btn-row">
                        <button class="btn secondary" type="button" onclick="editStrategy(${item.id})">编辑</button>
                        <button class="btn danger" type="button" onclick="deleteStrategy(${item.id})">删除</button>
                    </div>
                </div>
            `).join('');
            renderPagination('strategyPagination', pagination, 'changeStrategyPage');
        }

        function renderGroups() {
            const el = document.getElementById('groupList');
            const pagination = getPaginationData(groupData, groupPage, GROUP_PAGE_SIZE);
            groupPage = pagination.currentPage;
            document.getElementById('groupSummary').textContent = pagination.total
                ? `当前展示 ${pagination.start + 1}-${pagination.end} 条，共 ${pagination.total} 条`
                : '暂无策略组';
            if (!pagination.total) {
                el.innerHTML = '<div class="muted">暂无策略组</div>';
                renderPagination('groupPagination', pagination, 'changeGroupPage');
                return;
            }
            el.innerHTML = pagination.pageItems.map(item => `
                <div class="item">
                    <div class="row">
                        <div>
                            <div class="name">${item.name}</div>
                            <div class="small">${item.description || '无描述'}</div>
                        </div>
                        <div class="small">${item.match_mode || 'AND'}</div>
                    </div>
                    <div>${(item.strategies || []).map(s => `<span class="pill">${s.name}</span>`).join('')}</div>
                    <div class="btn-row">
                        <button class="btn secondary" type="button" onclick="editGroup(${item.id})">编辑</button>
                        <button class="btn danger" type="button" onclick="deleteGroup(${item.id})">删除</button>
                    </div>
                </div>
            `).join('');
            renderPagination('groupPagination', pagination, 'changeGroupPage');
        }

        function changeStrategyPage(page) {
            strategyPage = page;
            renderStrategies();
        }

        function changeGroupPage(page) {
            groupPage = page;
            renderGroups();
        }

        function renderGroupStrategyOptions(selectedIds = []) {
            const el = document.getElementById('groupStrategyList');
            const enabledStrategies = strategyData.filter(item => item.enabled);
            if (!enabledStrategies.length) {
                el.innerHTML = '<div class="muted">暂无可用策略，请先创建并启用策略</div>';
                return;
            }
            el.innerHTML = enabledStrategies.map(item => `
                <label class="checkbox-item">
                    <input type="checkbox" value="${item.id}" ${selectedIds.includes(item.id) ? 'checked' : ''} />
                    <span>${item.name}</span>
                </label>
            `).join('');
        }

        function editStrategy(id) {
            const item = strategyData.find(s => s.id === id);
            if (!item) return;
            document.getElementById('strategyId').value = item.id;
            document.getElementById('strategyName').value = item.name || '';
            document.getElementById('strategyDesc').value = item.description || '';
            document.getElementById('strategyCode').value = item.code || '';
            document.getElementById('strategyMode').value = item.create_mode === 'ai' ? 'ai' : 'direct';
            document.getElementById('strategyEnabled').checked = !!item.enabled;
            switchStrategyMode();
            openStrategyEditor(false);
        }

        function resetStrategyForm() {
            document.getElementById('strategyId').value = '';
            document.getElementById('strategyName').value = '';
            document.getElementById('strategyDesc').value = '';
            document.getElementById('strategyPrompt').value = '';
            document.getElementById('strategyCode').value = '';
            document.getElementById('strategyMode').value = 'direct';
            document.getElementById('strategyEnabled').checked = true;
            switchStrategyMode();
        }

        async function saveStrategy() {
            const id = document.getElementById('strategyId').value;
            const payload = {
                name: document.getElementById('strategyName').value.trim(),
                description: document.getElementById('strategyDesc').value.trim(),
                code: document.getElementById('strategyCode').value,
                enabled: document.getElementById('strategyEnabled').checked,
                create_mode: document.getElementById('strategyMode').value,
            };
            const url = id ? `/api/strategies/${id}` : '/api/strategies';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || '保存失败');
                return;
            }
            closeSheet('strategyEditorCard');
            resetStrategyForm();
            await loadAll();
        }

        async function deleteStrategy(id) {
            if (!confirm('确定删除这个策略吗？')) return;
            const res = await fetch(`/api/strategies/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || '删除失败');
                return;
            }
            await loadAll();
        }

        async function generateCode() {
            const prompt = document.getElementById('strategyPrompt').value.trim();
            if (!prompt) {
                alert('请先输入策略描述');
                return;
            }
            const button = document.getElementById('generateCodeBtn');
            const status = document.getElementById('generateStatus');
            const statusText = document.getElementById('generateStatusText');
            const sheetMask = document.getElementById('sheetLoadingMask');
            const sheetLoadingText = document.getElementById('sheetLoadingText');
            const originalLabel = button.textContent;
            const originalStatusText = statusText.textContent;
            const originalSheetLoadingText = sheetLoadingText.textContent;
            let slowHintTimer = null;
            let elapsedTimer = null;
            let elapsedSeconds = 0;
            button.disabled = true;
            button.textContent = '生成中...';
            statusText.textContent = originalStatusText;
            status.classList.add('show');
            sheetMask.classList.add('show');
            sheetLoadingText.textContent = originalSheetLoadingText;
            elapsedTimer = setInterval(() => {
                elapsedSeconds += 1;
                if (elapsedSeconds >= 10) {
                    statusText.textContent = `模型响应较慢，但仍在处理中，请继续稍候，不需要重复点击。已等待 ${elapsedSeconds} 秒`;
                    sheetLoadingText.textContent = `模型响应较慢，但仍在处理中。已等待 ${elapsedSeconds} 秒`;
                    return;
                }
                statusText.textContent = `正在调用 LLM 生成策略代码，通常需要几秒到几十秒，请稍候... 已等待 ${elapsedSeconds} 秒`;
                sheetLoadingText.textContent = `LLM 正在处理你的描述，请稍候... 已等待 ${elapsedSeconds} 秒`;
            }, 1000);
            slowHintTimer = setTimeout(() => {
                statusText.textContent = `模型响应较慢，但仍在处理中，请继续稍候，不需要重复点击。已等待 ${elapsedSeconds} 秒`;
                sheetLoadingText.textContent = `模型响应较慢，但仍在处理中。已等待 ${elapsedSeconds} 秒`;
            }, 10000);
            try {
                const res = await fetch('/api/strategies/generate-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || '生成失败');
                    return;
                }
                document.getElementById('strategyCode').value = data.code || '';
            } finally {
                if (slowHintTimer) clearTimeout(slowHintTimer);
                if (elapsedTimer) clearInterval(elapsedTimer);
                button.disabled = false;
                button.textContent = originalLabel;
                statusText.textContent = originalStatusText;
                sheetLoadingText.textContent = originalSheetLoadingText;
                sheetMask.classList.remove('show');
                status.classList.remove('show');
            }
        }

        async function copyLlmContext() {
            const prompt = document.getElementById('strategyPrompt').value.trim();
            if (!prompt) {
                alert('请先输入策略描述');
                return;
            }
            const button = document.getElementById('copyPromptBtn');
            const originalLabel = button.textContent;
            button.disabled = true;
            button.textContent = '准备中...';
            try {
                const res = await fetch('/api/strategies/generate-context', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || '获取上下文失败');
                    return;
                }
                await navigator.clipboard.writeText(data.copy_text || '');
                alert('已复制 LLM 上下文，你可以粘贴到外部模型中生成策略代码。');
            } catch (error) {
                alert('复制失败，请稍后重试');
            } finally {
                button.disabled = false;
                button.textContent = originalLabel;
            }
        }

        function editGroup(id) {
            const item = groupData.find(g => g.id === id);
            if (!item) return;
            document.getElementById('groupId').value = item.id;
            document.getElementById('groupName').value = item.name || '';
            document.getElementById('groupDesc').value = item.description || '';
            document.getElementById('groupMode').value = item.match_mode || 'AND';
            renderGroupStrategyOptions(item.strategy_ids || []);
            openGroupEditor(false);
        }

        function resetGroupForm() {
            document.getElementById('groupId').value = '';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMode').value = 'AND';
            renderGroupStrategyOptions([]);
        }

        async function saveGroup() {
            const strategyIds = Array.from(document.querySelectorAll('#groupStrategyList input:checked')).map(el => Number(el.value));
            const id = document.getElementById('groupId').value;
            const payload = {
                name: document.getElementById('groupName').value.trim(),
                description: document.getElementById('groupDesc').value.trim(),
                match_mode: document.getElementById('groupMode').value,
                strategy_ids: strategyIds,
            };
            const url = id ? `/api/strategy-groups/${id}` : '/api/strategy-groups';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || '保存失败');
                return;
            }
            closeSheet('groupEditorCard');
            resetGroupForm();
            await loadAll();
        }

        async function deleteGroup(id) {
            if (!confirm('确定删除这个策略组吗？')) return;
            const res = await fetch(`/api/strategy-groups/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) {
                alert(data.error || '删除失败');
                return;
            }
            await loadAll();
        }

        async function loadAll() {
            const res = await fetch('/api/strategies');
            const data = await res.json();
            strategyData = data.strategies || [];
            groupData = data.groups || [];
            renderStrategies();
            renderGroups();
            renderGroupStrategyOptions([]);
        }

        (async function init() {
            switchStrategyMode();
            await loadAll();
        })();
    </script>
</body>
</html>
